const APT = 'arenula';
const HAS_DOOR = false;

const urlP = new URLSearchParams(location.search);
let phase = 1;
const urlToken = urlP.get('t') || '';
if (urlP.has('phase')) {
  const cp = new URLSearchParams(urlP); cp.delete('phase');
  const qs = cp.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}
async function loadPhase() {
  if (!urlToken) { phase = 1; applyPhase(); schedulePhaseCheck(); return; }
  try {
    const r = await fetch(`${SERVER_URL}/checkin/arenula/phase?t=${encodeURIComponent(urlToken)}`);
    if (r.ok) { const j = await r.json(); phase = j.phase || 1; }
  } catch(e) { phase = 1; }
  localStorage.setItem('phase_arenula', phase);
  applyPhase(); schedulePhaseCheck();
}
function schedulePhaseCheck() {
  if (phase < 3 && urlToken) setTimeout(loadPhase, 60000);
}

function openModal(key) {
  const bg = document.getElementById('modalBg');
  const titleEl = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  titleEl.textContent = (MODAL_TITLES[key]||{})[lang] || key;
  if (key === 'chat') {
    body.innerHTML = buildAssistantUI();
    bg.classList.add('open');
    const inp = document.getElementById('romeAiInput');
    if (inp) {
      inp.placeholder = U().romeAiPlaceholder;
      inp.addEventListener('keydown', e => { if(e.key==='Enter') sendRomeAI(); });
    }
    buildChips();
    return;
  }
  if (key === 'apt') {
    body.innerHTML = buildAptContent();
    bg.classList.add('open');
    return;
  }
  const d = D()[key];
  if (!d) return;
  body.innerHTML = typeof d === 'function' ? d(A()) : d;
  bg.classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function outsideClose(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

function buildAptContent() {
  const a = A(); const d = D();

  return `<h3>${L.a}</h3>${addr}<h3>${L.c}</h3>${co}<h3>${L.e}</h3>${em}`;
}

}

  U().romeChips.forEach(c => {

    b.className = 'mini'; b.textContent = c;

// SHELLY OTP
let tokenExp=null,tokenJti=null,tokenTgt=null,tokenCid=null;
if (urlToken) {
  try {
    const p = JSON.parse(atob(urlToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    tokenExp=p.exp||null;tokenJti=p.jti||null;tokenTgt=p.tgt||null;tokenCid=p.cid||null;
  } catch {}
}
function tokenValid(){ return tokenExp && Date.now()<tokenExp; }
let sessionToken = sessionStorage.getItem('st_arenula')||'';
function sessionValid(){
  if(!sessionToken) return false;
  try{ const p=JSON.parse(atob(sessionToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); return p.exp&&Date.now()<p.exp; }catch{return false;}
}
let otpSent=false;

const DOOR_LABELS={
  en:{building:'🚪 Open Building Door',door:'🗖 Open Apartment Door',send:'Send verification code',codePlaceholder:'6-digit code',verify:'Verify',verifying:'Verifying…',wrongCode:'Wrong code, try again.',sending:'Sending…',codeSent:'Code sent to your registered contact. Enter it below:',expired:'Access expired (24h). Contact:',opening:'Opening…',opened:'Opened!',verifyTitle:'Verify your identity to unlock door access',confirmBuilding:'Open the building door only when you are standing in front of the entrance.',confirmDoor:'Open the apartment door only when you are in front of it.'},
  it:{building:'🚪 Apri Portone',door:'🗖 Apri Porta Appartamento',send:'Invia codice di verifica',codePlaceholder:'Codice a 6 cifre',verify:'Verifica',verifying:'Verifica…',wrongCode:'Codice errato, riprova.',sending:'Invio…',codeSent:'Codice inviato al tuo contatto. Inseriscilo:',expired:'Accesso scaduto (24h). Chiama:',opening:'Apertura…',opened:'Aperto!',verifyTitle:"Verifica la tua identità per sbloccare l'accesso",confirmBuilding:"Apri il portone solo quando sei davanti all'edificio.",confirmDoor:"Apri la porta solo quando sei davanti all'appartamento."},
  fr:{building:'🚪 Ouvrir Portail',door:'🗖 Ouvrir Appartement',send:'Envoyer le code',codePlaceholder:'Code 6 chiffres',verify:'Vérifier',verifying:'Vérification…',wrongCode:'Code incorrect.',sending:'Envoi…',codeSent:'Code envoyé. Entrez-le:',expired:'Accès expiré (24h). Contactez:',opening:'Ouverture…',opened:'Ouvert!',verifyTitle:"Vérifiez votre identité pour débloquer l'accès",confirmBuilding:"Ouvrez le portail uniquement devant l'entrée.",confirmDoor:"Ouvrez la porte uniquement devant l'appartement."},
  de:{building:'🚪 Gebäude öffnen',door:'🗖 Wohnung öffnen',send:'Zugangscode senden',codePlaceholder:'6-stelliger Code',verify:'Bestätigen',verifying:'Bestätige…',wrongCode:'Falscher Code.',sending:'Sende…',codeSent:'Code gesendet. Bitte eingeben:',expired:'Zugang abgelaufen (24h). Kontakt:',opening:'Öffne…',opened:'Geöffnet!',verifyTitle:'Identität bestätigen um Zugang freizuschalten',confirmBuilding:'Bitte nur öffnen wenn Sie davor stehen.',confirmDoor:'Bitte nur öffnen wenn Sie davor stehen.'},
  es:{building:'🚪 Abrir Portal',door:'🗖 Abrir Apartamento',send:'Enviar código',codePlaceholder:'Código 6 dígitos',verify:'Verificar',verifying:'Verificando…',wrongCode:'Código incorrecto.',sending:'Enviando…',codeSent:'Código enviado. Intróducelo:',expired:'Acceso expirado (24h). Contacta:',opening:'Abriendo…',opened:'Abierto!',verifyTitle:'Verifica tu identidad para desbloquear el acceso',confirmBuilding:'Abre el portal solo cuando estés frente al edificio.',confirmDoor:'Abre la puerta solo cuando estés frente al apartamento.'},
};

function buildKeysHTML(a){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  const email=`<div style="text-align:center;padding:16px 0"><div style="font-size:46px;margin-bottom:14px">📧</div><p style="font-weight:600;margin-bottom:12px;color:var(--cream)">${a.keys_msg}</p><p style="font-size:12px;color:var(--muted);margin-top:14px">${U().footerHelp} <a href="tel:${a.phone}" style="color:var(--gold)">${a.phone}</a></p></div>`;
  if(!urlToken) return email;
  if(!tokenValid()) return email+`<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;font-size:13px;color:#fca5a5;text-align:center">⏱ ${lbl.expired} <a href="tel:${a.phone}" style="color:var(--gold)">${a.phone}</a></div>`;
  if(!(tokenTgt&&tokenTgt.startsWith('checkin-'))) return email;
  if(!tokenCid||sessionValid()){
    let btns=`<button onclick="shellyOpen('building')" id="open-building-btn" style="width:100%;background:var(--gold);color:#120d09;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer;margin-top:12px">${lbl.building}</button>`;
    if(HAS_DOOR) btns+=`<button onclick="shellyOpen('door')" id="open-door-btn" style="width:100%;background:#1d4ed8;color:#fff;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer;margin-top:8px">${lbl.door}</button>`;
    return email+btns;
  }
  const otp=otpSent
    ?`<div style="margin-top:16px"><p style="font-size:13px;color:var(--muted);margin-bottom:8px">${lbl.codeSent}</p><input id="otp-input" type="tel" inputmode="numeric" maxlength="6" placeholder="${lbl.codePlaceholder}" style="width:100%;padding:12px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:11px;font-size:20px;text-align:center;letter-spacing:8px;margin-bottom:8px;color:var(--cream)"><button onclick="verifyOtp()" id="verify-btn" style="width:100%;background:var(--gold);color:#120d09;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer">${lbl.verify}</button><p id="otp-error" style="font-size:12px;color:#fca5a5;margin-top:8px;text-align:center"></p></div>`
    :`<div style="margin-top:16px;padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:15px;text-align:center"><p style="font-size:13px;color:var(--muted);margin-bottom:12px">🔐 ${lbl.verifyTitle}</p><button onclick="requestOtp()" id="send-otp-btn" style="width:100%;background:var(--gold);color:#120d09;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer">${lbl.send}</button><p id="send-otp-error" style="font-size:12px;color:#fca5a5;margin-top:8px;text-align:center"></p></div>`;
  return email+otp;
}

async function requestOtp(){
  const btn=document.getElementById('send-otp-btn'),errEl=document.getElementById('send-otp-error'),lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(btn){btn.disabled=true;btn.textContent=lbl.sending;}
  if(errEl) errEl.textContent='';
  const fail={en:'Unable to send code. Please call:',it:'Impossibile inviare il codice. Chiama:',fr:"Impossible d'envoyer le code. Appelez:",de:'Fehler beim Senden. Rufen Sie an:',es:'Error al enviar. Llame:'};
  try{
    const r=await fetch(`${SERVER_URL}/checkin/arenula/send-otp?t=${urlToken}&lang=${lang}`,{method:'POST'});
    const j=await r.json();
    if(j.ok){otpSent=true;openModal('keys');}
    else{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent=(fail[lang]||fail.en)+' '+A().phone;}
  }catch{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent='Network error. Call: '+A().phone;}
}

async function verifyOtp(){
  const input=document.getElementById('otp-input'),btn=document.getElementById('verify-btn'),errEl=document.getElementById('otp-error');
  if(!input||!btn) return;
  const code=input.value.trim(); if(code.length<4) return;
  btn.disabled=true;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verifying;
  try{
    const r=await fetch(`${SERVER_URL}/checkin/arenula/verify-otp?t=${urlToken}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const j=await r.json();
    if(j.ok&&j.st){sessionToken=j.st;sessionStorage.setItem('st_arenula',j.st);otpSent=false;openModal('keys');}
    else{if(errEl)errEl.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).wrongCode;btn.disabled=false;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verify;}
  }catch{btn.disabled=false;}
}

async function shellyOpen(type){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(!confirm(type==='building'?lbl.confirmBuilding:lbl.confirmDoor)) return;
  const btn=document.getElementById(`open-${type}-btn`); if(!btn) return;
  const orig=btn.textContent; btn.disabled=true;btn.textContent=lbl.opening;
  try{
    const ep=tokenCid?`${SERVER_URL}/checkin/arenula/open/${type}?t=${urlToken}&st=${sessionToken}`:`${SERVER_URL}/checkin/arenula/open-direct/${type}?t=${urlToken}`;
    const r=await fetch(ep,{method:'POST'});const j=await r.json();
    if(j.ok){btn.textContent=lbl.opened;btn.style.background='#22c55e';btn.style.color='#fff';setTimeout(()=>{btn.textContent=orig;btn.style.background='var(--gold)';btn.style.color='#120d09';btn.disabled=false;},4000);}
    else if(['otp_required','bad_session_token','session_expired'].includes(j.error)){sessionToken='';sessionStorage.removeItem('st_arenula');btn.disabled=false;btn.textContent=orig;openModal('keys');}
    else{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
  }catch{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
}

// GEMINI AI
let romeAiHistory=[];

function buildRomeSystemPrompt(){
  const a=A();
  return `You are the concierge for Via Arenula 16, Rome (NiceFlatInRome), located in the Historic Center near Campo de' Fiori, Jewish Ghetto, Tiber Island, Largo Argentina, and Trastevere across the river. Always respond in ${{en:'English',it:'Italian',fr:'French',de:'German',es:'Spanish'}[lang]||'English'}, regardless of what language the user types. Be warm, practical, and concise.\n\nApartment info: Check-in from ${a.checkin_time} | Check-out by ${a.checkout_time} | Wi-Fi: ${a.wifi_note} | SSID: ${a.wifi_ssid} | Password: ${a.wifi_password} | Intercom: ${a.intercom} | Elevator: ${a.elevator} | Door hours: ${a.door_hours} | Concierge: ${a.concierge} | Phone: ${a.phone} | Water: ${a.water_note} | AC: ${a.ac_note} | Gas stove: ${a.gas} | Bathroom: ${a.bathroom} | Pharmacy: ${a.pharmacy} | Hospital: ${a.hospital} | Transport: ${a.city_transport} | Airports: ${a.airports} | Emergency: ${a.emergency} | Checkout: ${a.checkout_note} | Keys: ${a.keys_msg}`;
}

async function sendRomeAI(prefill){
  const input=document.getElementById('romeAiInput');
  const text=prefill||(input?input.value.trim():'');
  if(!text) return;
  if(input) input.value='';
  addRomeBubble(text,'user');
  const spin=addRomeBubble('<div class="spin"></div>','bot');
  try{
    const res=await fetch(`${SERVER_URL}/api/ai/guide`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,systemPrompt:buildRomeSystemPrompt(),history:romeAiHistory})});
    const json=await res.json();
    if(!json.ok||!json.reply) throw new Error();
    spin.innerHTML=json.reply.replace(/\n/g,'<br>');
    romeAiHistory.push({role:'user',parts:[{text}]});
    romeAiHistory.push({role:'model',parts:[{text:json.reply}]});
  }catch{spin.innerHTML='⚠️ '+A().phone;}
}

function addRomeBubble(html,role){
  const wrap=document.getElementById('romeAiChatVisible');
  if(!wrap) return {innerHTML:''};
  const d=document.createElement('div');
  d.className=role==='user'?'bubble-user':'bubble-bot';
  d.innerHTML=html;
  wrap.appendChild(d);
  wrap.scrollTop=wrap.scrollHeight;
  return d;
}
