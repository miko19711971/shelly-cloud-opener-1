<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Via del Portico d'Ottavia 1D — Boutique Rome Concierge</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#120d09;--card:#211811;--card2:#2b2119;--gold:#d6b06d;--cream:#f5ead8;
  --muted:#b7a894;--line:rgba(214,176,109,.22);--shadow:0 18px 45px rgba(0,0,0,.35);
  --border:rgba(214,176,109,.14);--sheet:#1a1208;
}
html,body{
  background:radial-gradient(circle at top,rgba(214,176,109,.18),transparent 34%),
             linear-gradient(180deg,#18100b 0%,#0e0a07 100%);
  color:var(--cream);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  min-height:100vh;padding-bottom:90px;
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
button:active{transform:scale(.96)}
a{color:var(--gold)}

/* ── LANG BAR ── */
.langBar{
  display:flex;justify-content:center;gap:8px;padding:14px 0 8px;
  position:sticky;top:0;z-index:20;
  background:rgba(18,13,9,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.langBtn{
  font-size:23px;line-height:1;padding:4px 7px;border-radius:9px;
  opacity:.38;transition:opacity .18s,transform .18s,box-shadow .18s;
}
.langBtn.active{
  opacity:1;transform:scale(1.2);
  box-shadow:0 0 0 2px var(--gold),0 4px 14px rgba(214,176,109,.28);
  border-radius:8px;
}

/* ── HERO ── */
.hero{padding:40px 20px 30px;text-align:center}
.heroBadge{
  display:inline-block;font-size:9px;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold);background:rgba(214,176,109,.09);border:1px solid var(--line);
  border-radius:999px;padding:5px 16px;margin-bottom:18px;
}
.heroTitle{
  font-size:32px;font-weight:800;color:var(--cream);line-height:1.18;margin-bottom:10px;
  background:linear-gradient(135deg,var(--cream) 30%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.heroSub{font-size:13px;color:var(--muted);line-height:1.65;max-width:300px;margin:0 auto 24px}
.heroAddr{
  background:rgba(214,176,109,.07);border:1px solid var(--line);border-radius:22px;
  padding:15px 18px;display:flex;align-items:center;justify-content:space-between;
  gap:14px;max-width:370px;margin:0 auto;box-shadow:var(--shadow);
}
.heroAddrLabel{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.heroAddrText{font-size:13px;color:var(--cream);line-height:1.45;text-align:left}
.openBtn{
  background:linear-gradient(135deg,var(--gold),#c49a52);color:#120d09;
  font-weight:800;font-size:10px;padding:9px 15px;border-radius:12px;
  white-space:nowrap;letter-spacing:.08em;flex-shrink:0;
  box-shadow:0 4px 14px rgba(214,176,109,.3);
  transition:transform .15s,box-shadow .15s;
}
.openBtn:active{transform:scale(.95);box-shadow:0 2px 8px rgba(214,176,109,.2)}
.phasePill{
  display:block;text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:999px;padding:5px 16px;width:fit-content;margin:12px auto 0;
}

/* ── SECTIONS ── */
.section{padding:28px 18px 8px}
.sectionHead{
  font-size:10px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gold);margin-bottom:5px;opacity:.8;
}
.sectionTitle{font-size:22px;font-weight:800;color:var(--cream);margin-bottom:16px}

/* ── PHASE LOCK ── */
.phaseLock{
  margin:0 16px;background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:32px 24px;text-align:center;
  box-shadow:var(--shadow);
}
.phaseLock .li{font-size:42px;margin-bottom:16px}
.phaseLock p{font-size:13px;color:var(--muted);line-height:1.65}

/* ── CARD GRID ── */
.cardGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:20px 16px;cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .2s;
  text-align:left;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(214,176,109,.04),transparent);
  opacity:0;transition:opacity .2s;
}
.card:hover{border-color:rgba(214,176,109,.42);transform:translateY(-2px);box-shadow:var(--shadow)}
.card:hover::before{opacity:1}
.card.locked{opacity:.28;pointer-events:none;filter:blur(1px)}
.cardIcon{font-size:28px;margin-bottom:11px}
.cardTitle{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:4px}
.cardSub{font-size:11px;color:var(--muted);line-height:1.45}
.aptGrid{padding:0 16px 10px}
.romeGrid{padding:0 16px 10px}

/* ── ASSISTANT ── */
.assistant{
  background:linear-gradient(135deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:24px;
  margin:20px 16px;padding:30px 24px;text-align:center;
  box-shadow:var(--shadow);
}
.assistantIcon{font-size:38px;margin-bottom:12px}
.assistantTitle{font-size:20px;font-weight:800;color:var(--cream);margin-bottom:8px}
.assistantDesc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:20px}
.bigbtn{
  display:block;width:100%;
  background:linear-gradient(135deg,var(--gold),#c49a52);
  color:#120d09;font-weight:800;font-size:12px;letter-spacing:.1em;
  padding:14px;border-radius:14px;box-shadow:0 4px 16px rgba(214,176,109,.28);
  transition:transform .15s,box-shadow .15s;
}
.bigbtn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(214,176,109,.18)}

/* ── FOOTER ── */
footer{padding:16px 16px 0;text-align:center}
.waFooter{
  display:inline-block;background:rgba(37,211,102,.1);
  border:1px solid rgba(37,211,102,.3);border-radius:14px;
  padding:12px 20px;font-size:12px;color:#4ade80;font-weight:600;text-decoration:none;
  transition:background .18s;
}
.waFooter:hover{background:rgba(37,211,102,.16)}

/* ── WHATSAPP FLOAT ── */
.whatsappFloat{
  position:fixed;bottom:24px;right:18px;width:54px;height:54px;
  background:linear-gradient(135deg,#25D166,#1aaa52);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;z-index:100;
  box-shadow:0 4px 20px rgba(37,211,102,.45);
  text-decoration:none;transition:transform .18s,box-shadow .18s;
}
.whatsappFloat:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,.55)}

/* ── MODAL BOTTOM SHEET ── */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.72);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal.open{display:flex}
.sheet{
  background:var(--sheet);border-radius:24px 24px 0 0;
  width:100%;max-width:500px;max-height:90vh;
  overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,20px);
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
.sheetHandle{
  width:36px;height:4px;background:rgba(255,255,255,.14);
  border-radius:2px;margin:12px auto 0;
}
.sheetHeader{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 20px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--sheet);z-index:1;
}
.sheetHeader h3{font-size:15px;font-weight:700;color:var(--cream)}
.closeBtn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);color:var(--muted);
  font-size:19px;display:flex;align-items:center;justify-content:center;
  line-height:1;transition:background .15s;
}
.closeBtn:hover{background:rgba(255,255,255,.14)}
.sheetBody{padding:20px}
.sheetBody h3{
  color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;margin-top:18px;margin-bottom:6px;
  padding-bottom:5px;border-bottom:1px solid var(--line);
}
.sheetBody h3:first-child{margin-top:0}
.sheetBody p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:7px}
.sheetBody a{color:var(--gold);text-decoration:underline}
.sheetBody strong{color:var(--cream)}

/* ── SPINNER ── */
.spin{
  display:inline-block;width:15px;height:15px;
  border:2px solid rgba(255,255,255,.15);border-top-color:var(--gold);
  border-radius:50%;animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── CHAT BUBBLES ── */
.bubble-user{
  background:rgba(214,176,109,.13);border:1px solid rgba(214,176,109,.24);
  border-radius:16px 16px 4px 16px;padding:10px 13px;
  font-size:13px;align-self:flex-end;max-width:88%;color:var(--cream);
}
.bubble-bot{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:16px 16px 16px 4px;padding:10px 13px;
  font-size:13px;max-width:88%;color:var(--muted);
}
.mini{
  font-size:11px;background:rgba(214,176,109,.09);
  border:1px solid rgba(214,176,109,.2);color:var(--gold);
  padding:6px 12px;border-radius:999px;white-space:nowrap;cursor:pointer;
  transition:background .15s;
}
.mini:hover{background:rgba(214,176,109,.16)}
.mini:active{transform:scale(.95)}

/* ── GOLD DIVIDER ── */
.goldLine{
  height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:8px 0;opacity:.3;
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SERVER_URL = 'https://shelly-cloud-opener-1.onrender.com';
const APT = 'portico';
const HAS_DOOR = true;

// ═══════════════════════════════════════════════════════
// PHASE SYSTEM
// ═══════════════════════════════════════════════════════
const urlP = new URLSearchParams(location.search);
let phase = 1;
const urlToken = urlP.get('t') || '';
if (urlP.has('phase')) {
  const cp = new URLSearchParams(urlP); cp.delete('phase');
  const qs = cp.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}
async function loadPhase() {
  if (!urlToken) { phase = 1; applyPhase(); schedulePhaseCheck(); return; }
  try {
    const r = await fetch(`${SERVER_URL}/checkin/portico/phase?t=${encodeURIComponent(urlToken)}`);
    if (r.ok) { const j = await r.json(); phase = j.phase || 1; }
  } catch(e) { phase = 1; }
  localStorage.setItem('phase_portico', phase);
  applyPhase(); schedulePhaseCheck();
}
function schedulePhaseCheck() {
  if (phase < 3 && urlToken) setTimeout(loadPhase, 60000);
}

// ═══════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════
let lang = (urlP.get('lang') || localStorage.getItem('lang') || (navigator.language||'it').slice(0,2)).toLowerCase();

  titleEl.textContent = (MODAL_TITLES[key]||{})[lang] || key;

    body.innerHTML = buildAssistantUI();
    bg.classList.add('open');
    const inp = document.getElementById('romeAiInput');

      inp.placeholder = U().romeAiPlaceholder;
      inp.addEventListener('keydown', e => { if(e.key==='Enter') sendRomeAI(); });

  if (key === 'apt') {
    body.innerHTML = buildAptContent();
    bg.classList.add('open');

function buildKeysHTML(a){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  const email=`<div style="text-align:center;padding:18px 0"><div style="font-size:50px;margin-bottom:16px">📧</div><p style="font-weight:700;margin-bottom:14px;color:var(--cream)">${a.keys_msg}</p><p style="font-size:12px;color:var(--muted);margin-top:14px">${U().footerHelp} <a href="tel:${a.phone}" style="color:var(--gold)">${a.phone}</a></p></div>`;
  if(!urlToken) return email;
  if(!tokenValid()) return email+`<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;font-size:13px;color:#fca5a5;text-align:center">⏱ ${lbl.expired} <a href="tel:${a.phone}" style="color:var(--gold)">${a.phone}</a></div>`;
  if(!(tokenTgt&&tokenTgt.startsWith('checkin-'))) return email;
  if(!tokenCid||sessionValid()){
    let btns=`<button onclick="shellyOpen('building')" id="open-building-btn" style="width:100%;background:linear-gradient(135deg,var(--gold),#c49a52);color:#120d09;padding:14px;border-radius:14px;font-weight:800;font-size:15px;border:none;cursor:pointer;margin-top:12px;box-shadow:0 4px 16px rgba(214,176,109,.3)">${lbl.building}</button>`;
    if(HAS_DOOR) btns+=`<button onclick="shellyOpen('door')" id="open-door-btn" style="width:100%;background:#1d4ed8;color:#fff;padding:14px;border-radius:14px;font-weight:800;font-size:15px;border:none;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(29,78,216,.3)">${lbl.door}</button>`;
    return email+btns;
  }
  const otp=otpSent
    ?`<div style="margin-top:16px"><p style="font-size:13px;color:var(--muted);margin-bottom:10px">${lbl.codeSent}</p><input id="otp-input" type="tel" inputmode="numeric" maxlength="6" placeholder="${lbl.codePlaceholder}" style="width:100%;padding:13px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:12px;font-size:22px;text-align:center;letter-spacing:10px;margin-bottom:10px;color:var(--cream)"><button onclick="verifyOtp()" id="verify-btn" style="width:100%;background:linear-gradient(135deg,var(--gold),#c49a52);color:#120d09;padding:14px;border-radius:14px;font-weight:800;font-size:15px;border:none;cursor:pointer">${lbl.verify}</button><p id="otp-error" style="font-size:12px;color:#fca5a5;margin-top:8px;text-align:center"></p></div>`
    :`<div style="margin-top:16px;padding:16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;text-align:center"><p style="font-size:13px;color:var(--muted);margin-bottom:14px">🔐 ${lbl.verifyTitle}</p><button onclick="requestOtp()" id="send-otp-btn" style="width:100%;background:linear-gradient(135deg,var(--gold),#c49a52);color:#120d09;padding:14px;border-radius:14px;font-weight:800;font-size:15px;border:none;cursor:pointer">${lbl.send}</button><p id="send-otp-error" style="font-size:12px;color:#fca5a5;margin-top:8px;text-align:center"></p></div>`;
  return email+otp;
}

async function requestOtp(){
  const btn=document.getElementById('send-otp-btn'),errEl=document.getElementById('send-otp-error'),lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(btn){btn.disabled=true;btn.textContent=lbl.sending;}
  if(errEl) errEl.textContent='';
  const fail={en:'Unable to send code. Please call:',it:'Impossibile inviare il codice. Chiama:',fr:"Impossible d'envoyer le code. Appelez:",de:'Fehler beim Senden. Rufen Sie an:',es:'Error al enviar. Llame:'};
  try{
    const r=await fetch(`${SERVER_URL}/checkin/portico/send-otp?t=${urlToken}&lang=${lang}`,{method:'POST'});
    const j=await r.json();
    if(j.ok){otpSent=true;openModal('keys');}
    else{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent=(fail[lang]||fail.en)+' '+A().phone;}
  }catch{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent='Network error. Call: '+A().phone;}
}

async function verifyOtp(){
  const input=document.getElementById('otp-input'),btn=document.getElementById('verify-btn'),errEl=document.getElementById('otp-error');
  if(!input||!btn) return;
  const code=input.value.trim(); if(code.length<4) return;
  btn.disabled=true;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verifying;
  try{
    const r=await fetch(`${SERVER_URL}/checkin/portico/verify-otp?t=${urlToken}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const j=await r.json();
    if(j.ok&&j.st){sessionToken=j.st;sessionStorage.setItem('st_portico',j.st);otpSent=false;openModal('keys');}
    else{if(errEl)errEl.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).wrongCode;btn.disabled=false;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verify;}
  }catch{btn.disabled=false;}
}

async function shellyOpen(type){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(!confirm(type==='building'?lbl.confirmBuilding:lbl.confirmDoor)) return;
  const btn=document.getElementById(`open-${type}-btn`); if(!btn) return;
  const orig=btn.textContent; btn.disabled=true;btn.textContent=lbl.opening;
  try{
    const ep=tokenCid
      ?`${SERVER_URL}/checkin/portico/open/${type}?t=${urlToken}&st=${sessionToken}`
      :`${SERVER_URL}/checkin/portico/open-direct/${type}?t=${urlToken}`;
    const r=await fetch(ep,{method:'POST'});const j=await r.json();
    if(j.ok){
      btn.textContent=lbl.opened;btn.style.background='#22c55e';btn.style.color='#fff';
      setTimeout(()=>{
        btn.textContent=orig;
        btn.style.background=type==='building'?'linear-gradient(135deg,var(--gold),#c49a52)':'#1d4ed8';
        btn.style.color=type==='building'?'#120d09':'#fff';
        btn.disabled=false;
      },4000);
    }
    else if(['otp_required','bad_session_token','session_expired'].includes(j.error)){
      sessionToken='';sessionStorage.removeItem('st_portico');btn.disabled=false;btn.textContent=orig;openModal('keys');
    }
    else{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
  }catch{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
}

function applyPhase(){
  const lock=document.getElementById('phaseLock'),grid=document.getElementById('aptGrid'),keys=document.getElementById('keysCard');
  if(lock)lock.style.display=phase===1?'block':'none';
  if(grid)grid.style.display=phase<2?'none':'block';
  if(keys)keys.classList.toggle('locked',phase<3);
  setText('phasePill',(U().phaseBadge||[])[phase-1]||'');
}

function handleOpen(){
  if(phase<3){alert(U().keysPhase2);}else{openModal('keys');}
}

let romeAiHistory=[];

function buildRomeSystemPrompt(){
  const a=A();
  const langNames={en:'English',it:'Italian',fr:'French',de:'German',es:'Spanish'};
  return `You are the boutique concierge for Via del Portico d'Ottavia 1D, Rome (NiceFlatInRome), located in the Jewish Ghetto — one of the most ancient and charming neighborhoods in Rome, steps from the Portico d'Ottavia, Teatro di Marcello, Turtle Fountain and Tiber Island. Host: Michele. Always respond in ${langNames[lang]||'English'}, regardless of what language the user types. Be warm, practical, and concise.\n\nApartment info: Check-in from ${a.checkin_time} | Check-out by ${a.checkout_time} | Wi-Fi: ${a.wifi_note} | SSID: ${a.wifi_ssid} | Password: ${a.wifi_password} | Intercom: ${a.intercom} | Phone: ${a.phone} | WhatsApp: https://wa.me/393355245756 | Water: ${a.water_note} | AC: ${a.ac_note} | Kitchen: ${a.kitchen} | Bathroom: ${a.bathroom} | Pharmacy: ${a.pharmacy} | Transport: ${a.city_transport} | Airports: ${a.airports} | Taxi: ${a.taxi} | Emergency: ${a.emergency} | Checkout instructions: ${a.checkout_note} | Keys: ${a.keys_msg}`;
}

async function sendRomeAI(prefill){
  const input=document.getElementById('romeAiInput');
  const text=prefill||(input?input.value.trim():'');
  if(!text) return;
  if(input) input.value='';
  addRomeBubble(text,'user');
  const spin=addRomeBubble('<div class="spin"></div>','bot');
  try{
    const res=await fetch(`${SERVER_URL}/api/ai/guide`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,systemPrompt:buildRomeSystemPrompt(),history:romeAiHistory})
    });
    const json=await res.json();
    if(!json.ok||!json.reply) throw new Error();
    spin.innerHTML=json.reply.replace(/\n/g,'<br>');
    romeAiHistory.push({role:'user',parts:[{text}]});
    romeAiHistory.push({role:'model',parts:[{text:json.reply}]});
  }catch{spin.innerHTML='⚠️ '+A().phone;}
}

function addRomeBubble(html,role){
  const wrap=document.getElementById('romeAiChatVisible');
  if(!wrap) return {innerHTML:''};
  const d=document.createElement('div');
  d.className=role==='user'?'bubble-user':'bubble-bot';
  d.innerHTML=html;
  wrap.appendChild(d);
  wrap.scrollTop=wrap.scrollHeight;
  return d;
}
