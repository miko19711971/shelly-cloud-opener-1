<html lang="en">

<meta charset="utf-8">

<title>NiceFlat Rome Concierge — Via della Scala</title>
<link rel="manifest" href="/guides/scala/manifest.webmanifest">
<meta name="theme-color" content="#120d09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#120d09;--card:#211811;--card2:#2b2119;--gold:#d6b06d;--cream:#f5ead8;
  --muted:#b7a894;--line:rgba(214,176,109,.22);--shadow:0 18px 45px rgba(0,0,0,.35);
  --border:#2e2218;--sheet:#1a1208;--radius:20px;
}
html,body{
  background:radial-gradient(circle at top,rgba(214,176,109,.18),transparent 34%),
             linear-gradient(180deg,#18100b 0%,#0e0a07 100%);
  color:var(--cream);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  min-height:100vh;padding-bottom:90px;
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
button:active{transform:scale(.97)}
a{color:var(--gold)}

/* ── Lang Bar ─────────────────────────────────────────── */
.langBar{
  display:flex;justify-content:center;gap:8px;padding:14px 0 8px;
  position:sticky;top:0;z-index:50;
  background:rgba(18,13,9,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.langBtn{
  font-size:20px;line-height:1;padding:5px 7px;border-radius:10px;
  opacity:.38;transition:opacity .18s,transform .18s,box-shadow .18s;
  position:relative;
}
.langBtn.active{
  opacity:1;transform:scale(1.2);
  box-shadow:0 0 0 2px rgba(214,176,109,.5),0 0 12px rgba(214,176,109,.22);
  border-radius:10px;
}

/* ── Hero ─────────────────────────────────────────────── */
.hero{
  padding:42px 22px 32px;text-align:center;
  position:relative;
}
.hero::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;background:var(--line);
}
.heroBadge{
  display:inline-block;font-size:9.5px;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold);background:rgba(214,176,109,.1);border:1px solid var(--line);
  border-radius:999px;padding:5px 16px;margin-bottom:18px;
}
.heroTitle{
  font-size:32px;font-weight:800;color:var(--cream);line-height:1.18;
  margin-bottom:9px;letter-spacing:-.01em;
}
.heroName{
  font-size:14px;color:var(--gold);font-weight:600;letter-spacing:.06em;
  margin-bottom:5px;text-transform:uppercase;
}
.heroSub{
  font-size:13px;color:var(--muted);line-height:1.65;
  max-width:290px;margin:0 auto 26px;
}

/* address pill */
.heroAddr{
  background:rgba(214,176,109,.07);border:1px solid var(--line);
  border-radius:22px;padding:15px 18px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;max-width:370px;margin:0 auto;
  box-shadow:var(--shadow);
}
.heroAddrInner{text-align:left}
.heroAddrLabel{
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);margin-bottom:4px;
}
.heroAddrText{font-size:13px;color:var(--cream);line-height:1.45;font-weight:500}
.openBtn{
  background:linear-gradient(135deg,#e0be82,var(--gold));
  color:#120d09;font-weight:800;font-size:10.5px;
  padding:10px 16px;border-radius:13px;
  white-space:nowrap;letter-spacing:.08em;
  flex-shrink:0;box-shadow:0 4px 18px rgba(214,176,109,.28);
  transition:box-shadow .2s,transform .15s;
}
.openBtn:hover{box-shadow:0 6px 26px rgba(214,176,109,.42);}
.phasePill{
  display:block;text-align:center;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:999px;padding:5px 16px;
  width:fit-content;margin:14px auto 0;
}

/* ── Sections ─────────────────────────────────────────── */
.section{padding:28px 18px 8px}
.sectionHead{
  font-size:10px;letter-spacing:.34em;text-transform:uppercase;
  color:var(--gold);margin-bottom:5px;
}
.sectionTitle{font-size:22px;font-weight:700;color:var(--cream);margin-bottom:16px}

/* phase lock */
.phaseLock{
  margin:0 18px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:36px 24px;text-align:center;
}
.phaseLock .lockIcon{font-size:40px;margin-bottom:16px}
.phaseLock p{font-size:13px;color:var(--muted);line-height:1.65}

/* ── Card Grid ────────────────────────────────────────── */
.cardGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 15px;
  cursor:pointer;transition:border-color .22s,background .22s,transform .15s;
  text-align:left;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at top left,rgba(214,176,109,.06),transparent 60%);
  opacity:0;transition:opacity .22s;
  pointer-events:none;
}
.card:hover{
  border-color:rgba(214,176,109,.45);background:var(--card2);
  transform:translateY(-1px);
}
.card:hover::before{opacity:1}
.card.locked{opacity:.28;pointer-events:none;filter:blur(1.5px)}
.cardIcon{font-size:28px;margin-bottom:11px;display:block}
.cardTitle{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:3px}
.cardSub{font-size:11px;color:var(--muted);line-height:1.45}

.aptGrid{padding:0 18px 10px}
.romeGrid{padding:0 18px 10px}

/* ── Assistant ────────────────────────────────────────── */
.assistant{
  background:linear-gradient(135deg,#211811 0%,#1a1208 50%,#120d09 100%);
  border:1px solid var(--line);border-radius:24px;
  margin:22px 18px 8px;padding:32px 24px;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.assistant::before{
  content:'';position:absolute;top:-40%;left:-20%;
  width:60%;height:60%;
  background:radial-gradient(circle,rgba(214,176,109,.09),transparent 70%);
  pointer-events:none;
}
.assistantIcon{font-size:38px;margin-bottom:12px}
.assistantTitle{font-size:20px;font-weight:800;color:var(--cream);margin-bottom:8px}
.assistantDesc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:22px}
.bigbtn{
  display:block;width:100%;
  background:linear-gradient(135deg,#e0be82,var(--gold));
  color:#120d09;font-weight:800;font-size:12px;
  letter-spacing:.1em;padding:15px;border-radius:14px;
  box-shadow:0 6px 22px rgba(214,176,109,.3);
  transition:box-shadow .2s;
}
.bigbtn:hover{box-shadow:0 8px 30px rgba(214,176,109,.44);}

/* ── Footer ───────────────────────────────────────────── */
footer{padding:18px 18px 0;text-align:center}
.waFooter{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.28);
  border-radius:14px;padding:12px 20px;
  font-size:12px;color:#4ade80;font-weight:600;text-decoration:none;
  transition:background .2s,border-color .2s;
}
.waFooter:hover{background:rgba(37,211,102,.16);border-color:rgba(37,211,102,.45);}

/* ── WhatsApp Float ───────────────────────────────────── */
.whatsappFloat{
  position:fixed;bottom:24px;right:20px;
  width:54px;height:54px;
  background:linear-gradient(135deg,#25d16a,#1db954);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;z-index:100;
  box-shadow:0 4px 22px rgba(37,209,102,.45);
  text-decoration:none;transition:transform .18s,box-shadow .18s;
}
.whatsappFloat:hover{transform:scale(1.08);box-shadow:0 6px 30px rgba(37,209,102,.6);}

/* ── Modal / Bottom Sheet ─────────────────────────────── */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-end;justify-content:center;
}
.modal.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--sheet);border-radius:24px 24px 0 0;
  width:100%;max-width:490px;max-height:90vh;
  overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,18px);
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheetHandle{
  width:36px;height:4px;
  background:rgba(214,176,109,.25);border-radius:2px;
  margin:13px auto 0;
}
.sheetHeader{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 20px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--sheet);z-index:1;
}
.sheetHeader h3{font-size:15px;font-weight:700;color:var(--cream)}
.closeBtn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.06);color:var(--muted);
  font-size:20px;display:flex;align-items:center;justify-content:center;
  line-height:1;transition:background .18s;
}
.closeBtn:hover{background:rgba(255,255,255,.12);}
.sheetBody{padding:20px}
.sheetBody h3{
  color:var(--gold);font-size:11px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  margin-top:20px;margin-bottom:6px;
  padding-bottom:4px;border-bottom:1px solid var(--line);
}
.sheetBody h3:first-child{margin-top:0}
.sheetBody p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:8px}
.sheetBody a{color:var(--gold);text-decoration:underline}
.sheetBody strong{color:var(--cream)}

/* ── Spinner ──────────────────────────────────────────── */
.spin{
  display:inline-block;width:16px;height:16px;
  border:2.5px solid rgba(255,255,255,.15);
  border-top-color:var(--gold);border-radius:50%;
  animation:sp .7s linear infinite;vertical-align:middle;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Chat Bubbles ─────────────────────────────────────── */
.bubble-user{
  background:rgba(214,176,109,.13);border:1px solid rgba(214,176,109,.22);
  border-radius:16px 16px 4px 16px;padding:10px 13px;
  font-size:13px;align-self:flex-end;max-width:88%;color:var(--cream);
}
.bubble-bot{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:16px 16px 16px 4px;padding:10px 13px;
  font-size:13px;max-width:88%;color:var(--muted);
}

/* ── Chip Buttons ─────────────────────────────────────── */
.mini{
  font-size:11px;background:rgba(214,176,109,.09);
  border:1px solid rgba(214,176,109,.2);color:var(--gold);
  padding:6px 13px;border-radius:999px;
  white-space:nowrap;cursor:pointer;
  transition:background .18s,border-color .18s;
}
.mini:hover{background:rgba(214,176,109,.18);border-color:rgba(214,176,109,.38);}

/* ── Divider ──────────────────────────────────────────── */
.goldLine{
  height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);
  margin:6px 18px;
}
</style>
</head>

<div class="goldLine"></div>

<!-- ASSISTANT -->

/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
const SERVER_URL = 'https://shelly-cloud-opener-1.onrender.com';
const APT = 'scala';
const HAS_DOOR = true;

/* ═══════════════════════════════════════════════════════
   URL / PHASE
═══════════════════════════════════════════════════════ */
const urlP = new URLSearchParams(location.search);
let phase = 1;
const urlToken = urlP.get('t') || '';
if (urlP.has('phase')) {
  const cp = new URLSearchParams(urlP); cp.delete('phase');
  const qs = cp.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}

async function loadPhase() {
  if (!urlToken) { phase = 1; applyPhase(); schedulePhaseCheck(); return; }
  try {
    const r = await fetch(`${SERVER_URL}/checkin/scala/phase?t=${encodeURIComponent(urlToken)}`);
    if (r.ok) { const j = await r.json(); phase = j.phase || 1; }
  } catch(e) { phase = 1; }
  localStorage.setItem('phase_scala', phase);
  applyPhase(); schedulePhaseCheck();
}
function schedulePhaseCheck() {
  if (phase < 3 && urlToken) setTimeout(loadPhase, 60000);
}

/* ═══════════════════════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════════════════════ */

    transport:()=>`<h3>Tram &amp; Bus</h3><p><strong>Tram 8</strong> — arrêt Belli/Sonnino (~2 min à pied) : → Campo de' Fiori (2 arrêts) · Piazza Venezia (4 arrêts) · Largo Argentina</p><p><strong>Bus H</strong> — Viale Trastevere : → Termini (~25 min, direct)</p><p><strong>Bus 23</strong> — Lungotevere : → Prati · Vatican</p><p><strong>Bus 115</strong> — zone Trastevere/Gianicolo</p><h3>Fiumicino (FCO)</h3><p>Tram 8 → Gare Trastevere (~5 min, 1 arrêt) → FL1 → Fiumicino (~40 min) · total ~45 min · ~€8<br>Taxi tarif fixe : €50–55 (nuit +€10)</p><h3>Ciampino (CIA)</h3><p>Bus Terravision depuis Termini (~50 min, ~€6) : <a href="https://www.terravision.eu" target="_blank">terravision.eu</a><br>Ou taxi : ~€35–40</p><h3>Taxi</h3><p>Radio Taxi Roma : +39 06 3570<br>Applis : FreeNow · itTaxi · Uber<br>Tarif fixe Fiumicino : €50–55</p><h3>Transfert Privé</h3><p>Welcome Pickups : <a href="https://www.welcomepickups.com" target="_blank">welcomepickups.com</a></p><h3>Consigne Bagages</h3><p>Radical Storage — Trastevere ou Largo Argentina : <a href="https://radicalstorage.com" target="_blank">radicalstorage.com</a> · à partir de €5/jour</p>`,

function openModal(key) {
  const bg = document.getElementById('modalBg');
  const titleEl = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  titleEl.textContent = (MODAL_TITLES[key]||{})[lang] || key;

  if (key === 'chat') {
    body.innerHTML = buildAssistantUI();
    bg.classList.add('open');
    const inp = document.getElementById('romeAiInput');
    if (inp) {
      inp.placeholder = U().romeAiPlaceholder;
      inp.addEventListener('keydown', e => { if(e.key==='Enter') sendRomeAI(); });
    }
    buildChips();
    return;
  }
  if (key === 'apt') {
    body.innerHTML = buildAptContent();
    bg.classList.add('open');
    return;
  }
  const d = D()[key];
  if (!d) return;
  body.innerHTML = typeof d === 'function' ? d(A()) : d;
  bg.classList.add('open');
}

async function requestOtp(){
  const btn=document.getElementById('send-otp-btn'),errEl=document.getElementById('send-otp-error');
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(btn){btn.disabled=true;btn.textContent=lbl.sending;}
  if(errEl) errEl.textContent='';
  const fail={en:'Unable to send code. Please call:',it:'Impossibile inviare il codice. Chiama:',fr:"Impossible d'envoyer le code. Appelez:",de:'Fehler beim Senden. Rufen Sie an:',es:'Error al enviar. Llame:'};
  try{
    const r=await fetch(`${SERVER_URL}/checkin/scala/send-otp?t=${urlToken}&lang=${lang}`,{method:'POST'});
    const j=await r.json();
    if(j.ok){otpSent=true;openModal('keys');}
    else{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent=(fail[lang]||fail.en)+' '+A().phone;}
  }catch{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent='Network error. Call: '+A().phone;}
}

async function verifyOtp(){
  const input=document.getElementById('otp-input'),btn=document.getElementById('verify-btn'),errEl=document.getElementById('otp-error');
  if(!input||!btn) return;
  const code=input.value.trim(); if(code.length<4) return;
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  btn.disabled=true; btn.textContent=lbl.verifying;
  try{
    const r=await fetch(`${SERVER_URL}/checkin/scala/verify-otp?t=${urlToken}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const j=await r.json();
    if(j.ok&&j.st){sessionToken=j.st;sessionStorage.setItem('st_scala',j.st);otpSent=false;openModal('keys');}
    else{if(errEl)errEl.textContent=lbl.wrongCode;btn.disabled=false;btn.textContent=lbl.verify;}
  }catch{btn.disabled=false;}
}

async function shellyOpen(type){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(!confirm(type==='building'?lbl.confirmBuilding:lbl.confirmDoor)) return;
  const btn=document.getElementById(`open-${type}-btn`); if(!btn) return;
  const orig=btn.textContent; btn.disabled=true; btn.textContent=lbl.opening;
  try{
    const ep=tokenCid
      ?`${SERVER_URL}/checkin/scala/open/${type}?t=${urlToken}&st=${sessionToken}`
      :`${SERVER_URL}/checkin/scala/open-direct/${type}?t=${urlToken}`;
    const r=await fetch(ep,{method:'POST'}); const j=await r.json();
    if(j.ok){
      btn.textContent=lbl.opened; btn.style.background='#22c55e'; btn.style.color='#fff';
      setTimeout(()=>{
        btn.textContent=orig;
        btn.style.background=type==='building'?'linear-gradient(135deg,#e0be82,var(--gold))':'#1d4ed8';
        btn.style.color=type==='building'?'#120d09':'#fff';
        btn.disabled=false;
      },4000);
    }else if(['otp_required','bad_session_token','session_expired'].includes(j.error)){
      sessionToken=''; sessionStorage.removeItem('st_scala');
      btn.disabled=false; btn.textContent=orig; openModal('keys');
    }else{btn.textContent='✗'; btn.disabled=false; setTimeout(()=>{btn.textContent=orig;},3000);}
  }catch{btn.textContent='✗'; btn.disabled=false; setTimeout(()=>{btn.textContent=orig;},3000);}
}

function applyPhase(){
  const lock=document.getElementById('phaseLock'),grid=document.getElementById('aptGrid'),keys=document.getElementById('keysCard');
  if(lock)lock.style.display=phase===1?'block':'none';
  if(grid)grid.style.display=phase<2?'none':'block';
  if(keys){
    keys.classList.toggle('locked',phase<3);
    if(phase===3){
      const icon=keys.querySelector('.cardIcon');
      if(icon)icon.textContent='✅';
      const checkinUrl=`${SERVER_URL}/checkin/scala/?d=${tokenDay||''}`;
      keys.onclick=()=>{ window.location.href=checkinUrl; };
    }
  }
  const heroBox=document.getElementById('heroAddrBox');
  if(heroBox)heroBox.style.display=phase===3?'none':'';
  setText('phasePill',(U().phaseBadge||[])[phase-1]||'');
}

let romeAiHistory=[];

function buildRomeSystemPrompt(){
  const a=A();
  const langName={en:'English',it:'Italian',fr:'French',de:'German',es:'Spanish'}[lang]||'English';
  return `You are the concierge for Via della Scala 17, Rome (NiceFlatInRome), located in Trastevere — one of Rome's most romantic and vibrant neighborhoods, known for cobblestone alleys, Santa Maria in Trastevere, great restaurants and nightlife. Campo de' Fiori and Piazza Navona are just across Ponte Sisto. Always respond in ${langName}, regardless of what language the user types. Be warm, practical, and concise.\n\nApartment info: Check-in from ${a.checkin_time} | Check-out by ${a.checkout_time} | Wi-Fi: ${a.wifi_note} | SSID: ${a.wifi_ssid} | Password: ${a.wifi_password} | Intercom: ${a.intercom} | Phone: ${a.phone} | Water: ${a.water_note} | AC: ${a.ac_note} | Gas stove: ${a.gas} | Washing machine: ${a.washer} | Bathroom: ${a.bathroom} | Pharmacy: ${a.pharmacy} | Transport: ${a.city_transport} | Airports: ${a.airports} | Taxi: ${a.taxi} | Emergency: ${a.emergency} | Checkout: ${a.checkout_note} | Keys: ${a.keys_msg}`;
}

async function sendRomeAI(prefill){
  const input=document.getElementById('romeAiInput');
  const text=prefill||(input?input.value.trim():'');
  if(!text) return;
  if(input) input.value='';
  addRomeBubble(text,'user');
  const spin=addRomeBubble('<div class="spin"></div>','bot');
  try{
    const res=await fetch(`${SERVER_URL}/api/ai/guide`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,systemPrompt:buildRomeSystemPrompt(),history:romeAiHistory})
    });
    const json=await res.json();
    if(!json.ok||!json.reply) throw new Error();
    spin.innerHTML=json.reply.replace(/\n/g,'<br>');
    romeAiHistory.push({role:'user',parts:[{text}]});
    romeAiHistory.push({role:'model',parts:[{text:json.reply}]});
  }catch{ spin.innerHTML='⚠️ '+A().phone; }
}

function addRomeBubble(html,role){
  const wrap=document.getElementById('romeAiChatVisible');
  if(!wrap) return {innerHTML:''};
  const d=document.createElement('div');
  d.className=role==='user'?'bubble-user':'bubble-bot';
  d.innerHTML=html;
  wrap.appendChild(d);
  wrap.scrollTop=wrap.scrollHeight;
  return d;
}

<script>
(function(){
  if(sessionStorage.getItem('pwaDismissed')) return;
  var bar=document.getElementById('pwaBar');
  var sub=document.getElementById('pwaBarSub');
  var installBtn=document.getElementById('pwaInstallBtn');
  var deferredPrompt=null;
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
  var isInStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
  if(isInStandalone) return;
  if(isIOS){
    bar.style.display='flex';
    installBtn.style.display='none';
    sub.textContent='Tap Share → Add to Home Screen → Add';
    return;
  }
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferredPrompt=e;
    bar.style.display='flex';
    installBtn.onclick=function(){
      bar.style.display='none';
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){deferredPrompt=null;});
    };
  });
  window.addEventListener('appinstalled',function(){
    bar.style.display='none';
    deferredPrompt=null;
  });
})();

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js');
  });
}
