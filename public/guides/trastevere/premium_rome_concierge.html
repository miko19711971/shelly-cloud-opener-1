<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#120d09;--card:#211811;--card2:#2b2119;--gold:#d6b06d;--cream:#f5ead8;
  --muted:#b7a894;--line:rgba(214,176,109,.22);--shadow:0 18px 45px rgba(0,0,0,.35);
  --border:#2e2218;--sheet:#1a1208;
}
html,body{
  background:radial-gradient(circle at top,rgba(214,176,109,.18),transparent 34%),
             linear-gradient(180deg,#18100b 0%,#0e0a07 100%);
  color:var(--cream);font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;padding-bottom:90px;
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
button:active{transform:scale(.97)}
a{color:var(--gold)}

/* ── LANG BAR ── */
.langBar{
  display:flex;justify-content:center;gap:8px;padding:14px 0 8px;
  position:sticky;top:0;z-index:20;
  background:rgba(18,13,9,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.langBtn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:4px 6px;border-radius:8px;border:none;background:none;cursor:pointer;
  opacity:.35;transition:opacity .18s,transform .18s,box-shadow .18s;
}
.langBtn img{
  width:28px;height:20px;border-radius:3px;display:block;
  box-shadow:0 1px 4px rgba(0,0,0,.45);
}
.langBtn.active{opacity:1;transform:scale(1.18);}
.langBtn.active img{box-shadow:0 0 0 2px rgba(214,176,109,.7),0 2px 8px rgba(0,0,0,.5);}
.langBtn:hover{opacity:.75}

/* ── HERO ── */
.hero{padding:42px 20px 32px;text-align:center}
.heroBadge{
  display:inline-block;font-size:9px;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold);background:rgba(214,176,109,.1);border:1px solid var(--line);
  border-radius:999px;padding:5px 16px;margin-bottom:18px;
}
.heroTitle{
  font-size:32px;font-weight:800;color:var(--cream);line-height:1.18;
  margin-bottom:6px;letter-spacing:-.3px;
}
.heroApt{font-size:14px;color:var(--gold);font-weight:600;margin-bottom:6px;letter-spacing:.05em;}
.heroSub{display:none}
.heroAddr{
  background:rgba(214,176,109,.07);border:1px solid var(--line);
  border-radius:22px;padding:16px 18px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;max-width:380px;margin:0 auto;
  box-shadow:var(--shadow);
}
.heroAddrLeft{}
.heroAddrLabel{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.heroAddrText{font-size:13px;color:var(--cream);line-height:1.4;text-align:left}
.openBtn{
  background:linear-gradient(135deg,#e8c67a,var(--gold));color:#120d09;
  font-weight:800;font-size:11px;padding:10px 16px;border-radius:13px;
  white-space:nowrap;letter-spacing:.07em;flex-shrink:0;
  box-shadow:0 4px 18px rgba(214,176,109,.3);transition:transform .15s,box-shadow .15s;
}
.openBtn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(214,176,109,.42);}
.phasePill{
  display:block;text-align:center;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);background:rgba(214,176,109,.08);border:1px solid rgba(214,176,109,.25);
  border-radius:999px;padding:7px 22px;width:fit-content;margin:20px auto 10px;
  box-shadow:0 0 18px rgba(214,176,109,.1);
}

/* ── SECTIONS ── */
.section{padding:26px 18px 8px}
.sectionEyebrow{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.sectionTitle{font-size:22px;font-weight:700;color:var(--cream);margin-bottom:16px}
.sectionAptRow{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:nowrap;margin-bottom:0}
.sectionAptRow>div{flex:1;min-width:0;overflow:hidden}
.sectionAptRow .sectionTitle{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#weatherWidget{display:flex;align-items:center;gap:10px;background:rgba(214,176,109,.07);border:1px solid rgba(214,176,109,.18);border-radius:12px;padding:8px 14px;cursor:pointer;text-decoration:none;flex-shrink:0}
#weatherWidget:active{opacity:.75}
#wTime{font-size:15px;font-weight:800;color:#f5ead8;font-variant-numeric:tabular-nums;min-width:42px}
#wTemp{font-size:15px;font-weight:700;color:#d6b06d}
#wIcon{font-size:18px;line-height:1}
#wArrow{font-size:11px;color:#b7a894;margin-left:2px;opacity:.7}
.phaseLock{
  margin:0 16px 20px;
  background:linear-gradient(135deg,rgba(214,176,109,.07) 0%,rgba(214,176,109,.02) 100%);
  border:1px solid rgba(214,176,109,.2);
  border-radius:24px;padding:30px 24px 34px;text-align:center;
  box-shadow:0 4px 28px rgba(0,0,0,.18),inset 0 1px 0 rgba(214,176,109,.08);
}
.phaseLock .li,.phaseLock .lockIcon{font-size:28px;margin-bottom:14px;opacity:.65;display:block}
.phaseLock p{font-size:14px;color:var(--cream);opacity:.75;line-height:1.75;letter-spacing:.01em}

/* ── CARD GRID ── */
.cardGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 8px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:20px 16px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;text-align:left;
}
.card:hover{border-color:var(--line);transform:translateY(-2px);box-shadow:var(--shadow);}
.card.locked{opacity:.28;pointer-events:none;filter:blur(1px)}
.wide{grid-column:1/-1}
#insiderCard .cardIcon{font-size:38px;color:#d6b06d}
#keysCard{display:none}
.cardIcon{font-size:28px;margin-bottom:11px}
.cardTitle{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:4px}
.cardSub{font-size:11px;color:var(--muted);line-height:1.45}
.cardFull{grid-column:1/-1}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--line);margin:28px 16px 0}

/* ── ASSISTANT ── */
.assistant{
  background:linear-gradient(135deg,var(--card),#150f0a);
  border:1px solid var(--line);border-radius:24px;
  margin:24px 16px 0;padding:30px 24px;text-align:center;

}
.assistantBadge{

}
.assistantTitle{font-size:20px;font-weight:800;color:var(--cream);margin-bottom:8px}
.assistantDesc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:20px}
.bigbtn{
  display:block;width:100%;
  background:linear-gradient(135deg,#e8c67a,var(--gold));
  color:#120d09;font-weight:800;font-size:12px;letter-spacing:.1em;
  padding:14px;border-radius:15px;
  box-shadow:0 6px 24px rgba(214,176,109,.28);transition:transform .15s;
}
.bigbtn:hover{transform:translateY(-1px);}

/* ── FOOTER ── */
footer{padding:20px 16px 0;text-align:center}
.waFooter{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.28);

/* ── WHATSAPP FLOAT ── */
.whatsappFloat{

.whatsappFloat:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,.6);}

/* ── MODAL / BOTTOM SHEET ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal.fullscreen{align-items:stretch;justify-content:stretch;background:var(--bg)}
.modal.fullscreen .sheet{border-radius:0;max-width:100%;width:100%;height:100%;max-height:100%;display:flex;flex-direction:column}
.modal.fullscreen .sheetHandle{display:none}
.modal.fullscreen .sheetBody{flex:1;overflow-y:auto}
.sheet{
  background:var(--sheet);border-radius:26px 26px 0 0;
  width:100%;max-width:500px;max-height:92vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom,16px);

}
.sheetHandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0}
.sheetHeader{

  position:sticky;top:0;background:var(--sheet);z-index:1;
}
.sheetHeader h3{font-size:15px;font-weight:700;color:var(--cream)}
.closeBtn{
  width:32px;height:32px;border-radius:50%;background:var(--card);
  color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.closeBtn:hover{background:var(--card2);}
.sheetBody{padding:20px}
.sheetBody h3{
  color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;margin-top:18px;margin-bottom:6px;
}
.sheetBody h3:first-child{margin-top:0}
.sheetBody p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:8px}
.sheetBody a{color:var(--gold);text-decoration:underline}
.sheetBody strong{color:var(--cream)}
.sheetBody .warning{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
  border-radius:14px;padding:14px;margin:10px 0;font-size:13px;color:#fca5a5;line-height:1.65;
}

/* ── SPINNER ── */
.spin{
  display:inline-block;width:15px;height:15px;
  border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold);
  border-radius:50%;animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── CHAT BUBBLES ── */
.bubble-user{
  background:rgba(214,176,109,.15);border:1px solid rgba(214,176,109,.25);
  border-radius:16px 16px 4px 16px;padding:10px 13px;font-size:13px;
  align-self:flex-end;max-width:88%;color:var(--cream);
}
.bubble-bot{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:16px 16px 16px 4px;padding:10px 13px;font-size:13px;
  max-width:88%;color:var(--muted);
}
.mini{
  font-size:11px;background:rgba(214,176,109,.1);border:1px solid rgba(214,176,109,.2);
  color:var(--gold);padding:6px 12px;border-radius:999px;white-space:nowrap;cursor:pointer;
  transition:background .15s;
}
.mini:hover{background:rgba(214,176,109,.18);}
.mini:active{transform:scale(.96)}

/* ── GOLD ACCENT LINE ── */
.goldLine{
  width:48px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);

#keysCard::before{display:none!important}

.cardIconWrap{width:40px;height:40px;border-radius:11px;background:rgba(214,176,109,.14);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:11px}
</style>

<script>
const SERVER_URL = 'https://shelly-cloud-opener-1.onrender.com';
const APT = 'trastevere';
const HAS_DOOR = true;

const urlP = new URLSearchParams(location.search);
let phase = 1;
const urlToken = urlP.get('t') || '';
if (urlToken) localStorage.setItem('token_trastevere', urlToken);
const effectiveToken = urlToken || localStorage.getItem('token_trastevere') || '';
(function(){var ml=document.createElement('link');ml.rel='manifest';ml.href='/guides/trastevere/manifest'+(effectiveToken?'?t='+encodeURIComponent(effectiveToken):'');document.head.appendChild(ml);})();
if (urlP.has('phase')) {
  const cp = new URLSearchParams(urlP); cp.delete('phase');
  const qs = cp.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}
async function loadPhase() {
  if (!effectiveToken) { phase = 1; applyPhase(); schedulePhaseCheck(); return; }
  try {
    const _pp=JSON.parse(atob(effectiveToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if(typeof _pp.op_phase==='number'){
      phase=_pp.op_phase; applyPhase();
    } else if(_pp.day){
      const _td=new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Rome'}).format(new Date());
      if(_pp.day<_td){phase=3;}
      else if(_pp.day===_td){
        const _pts=new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Rome',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date());
        const _h=parseInt((_pts.find(x=>x.type==='hour')||{value:'0'}).value);
        const _m=parseInt((_pts.find(x=>x.type==='minute')||{value:'0'}).value);
        const [_ch,_cm]=(_pp.ct||'13:00').split(':').map(Number);
        phase=(_h*60+_m)>=(_ch*60+_cm)?3:2;
      }else{phase=2;}
      applyPhase();
    }
  }catch{}
  try {
    const r = await fetch(`${SERVER_URL}/checkin/trastevere/phase?t=${encodeURIComponent(effectiveToken)}`);
    if (r.ok) { const j = await r.json(); phase = j.phase || 1; }
  } catch(e) {}
  localStorage.setItem('phase_trastevere', phase);
  applyPhase(); schedulePhaseCheck();
}
function schedulePhaseCheck() {
  if (phase < 3 && urlToken) setTimeout(loadPhase, 60000);
}

let lang = (urlP.get('lang') || localStorage.getItem('lang') || (navigator.language||'en').slice(0,2)).toLowerCase();

const DATA = {
en:{
  ui:{
    heroTitle:'Boutique Rome Concierge',heroSub:'Curated luxury hospitality in the heart of Trastevere.',aptLabel:'Apartment',
    aptTitle:'Your Apartment 🏠',romeTitle:'Explore Rome 🌙',
    keysTitle:'Digital Keys',keysSub:'Open building & apartment',
    wifiTitle:'Wi‑Fi',wifiSub:'Network & password',
    houseTitle:'House Guide',houseSub:'Instructions & tips',
    helpTitle:'Need Help?',helpSub:'Concierge support',
    eatTitle:'Eat & Drink',eatSub:'Restaurants, breakfast & aperitivo',
    tonightTitle:'Tonight in Rome',tonightSub:'Bars, rooftops & evening ideas',
    tickTitle:'Ticketing',tickSub:'Museums, tours & experiences',
    transTitle:'Transport',transSub:'Tram, taxi & airports',
    footerHelp:'Need help?',
    phase1Text:'Your electronic keys will be unlocked on your check-in day.',
    phaseBadge:['📋 After Booking','✅ After Check-in','🔑 Check-in Day'],
    keysPhase2:'Your digital keys will be available from 13:00 on check-in day.',
    romeAiPlaceholder:'Gas stove, WiFi, restaurants, Gianicolo…',
    romeChips:['Best restaurant in Trastevere','WiFi password','Checkout time','Romantic walk'],
  },
  apt:{
    checkin_time:'13:00',checkout_time:'11:00',
    wifi_note:'Near the TV there is a WHITE router. Turn it around to see the label with SSID and password.',

    eat:`<h3>Breakfast</h3><p><strong>Bar San Calisto</strong> — Piazza San Calisto 3 · historic Trastevere bar, great local vibe (~6 min)</p><p><strong>Suppli Roma</strong> — Via di San Francesco a Ripa 137 · fried supplì &amp; savoury breakfast (~5 min) · <a href="https://www.suppliroma.it" target="_blank">suppliroma.it</a></p><h3>Lunch</h3><p><strong>Da Enzo al 29</strong> — Via dei Vascellari 29 · authentic Roman trattoria, book ahead (~8 min) · <a href="tel:0658122260">06 581 2260</a></p><p><strong>Osteria der Belli</strong> — Piazza Sant'Apollonia 11 · classic Lazio cuisine at honest prices (~5 min)</p><h3>Dinner</h3><p><strong>Tonnarello</strong> — Via della Paglia 1 · Roman classics, street tables, very popular (~6 min) · <a href="https://www.tonnarello.it" target="_blank">tonnarello.it</a></p><p><strong>Trattoria Da Teo</strong> — Piazza dei Ponziani 7 · true Roman, tortelloni &amp; coda alla vaccinara (~8 min) · <a href="tel:0658183550">06 581 8355</a></p><p><strong>Pianostrada</strong> — Via delle Zoccolette 22 · creative cuisine, reservation only (~10 min) · <a href="https://www.pianostrada-laboratoriodicucina.it/" target="_blank">pianostrada.it</a></p><p><strong>Spirito di Vino</strong> — Via dei Genovesi 31 · historic cuisine in a 1300s cellar (~7 min)</p><h3>Aperitivo &amp; Cocktails</h3><p><strong>Freni e Frizioni</strong> — Via del Politeama 4 · Rome's most iconic aperitivo, opens 18:30 (~6 min)</p><p><strong>Enoteca Ferrara</strong> — Piazza Trilussa 41 · elegant wine bar, excellent selection (~7 min)</p><p><strong>La Prosciutteria Trastevere</strong> — Vicolo del Cinque 2 · charcuterie boards &amp; wine in a charming alley (~6 min)</p><p><strong>Bar San Calisto</strong> — Piazza San Calisto 3 · Roman-style aperitivo, budget-friendly (~6 min)</p><h3>Gelato</h3><p><strong>Fior di Luna</strong> — Via della Lungaretta 96 · artisan gelato, no artificial colours (~10 min) · <a href="https://www.fiordiluna.com" target="_blank">fiordiluna.com</a></p>`,

    transport:`<h3>Tram &amp; Bus</h3><p><strong>Tram 8</strong> — stop Belli (~1 min walk): → Largo Argentina · Campo de' Fiori · Piazza Venezia</p><p><strong>Tram 3</strong> — stop Belli (~1 min walk): → Colosseo · Villa Borghese · Termini</p><p><strong>Bus H</strong> — Viale Trastevere: → Termini (~25 min, direct)</p><p><strong>Bus 23</strong> — Lungotevere: → Prati · Vatican</p><h3>Fiumicino Airport (FCO)</h3><p>Tram 8 → Trastevere Station (2 stops, ~5 min) → FL1 → Fiumicino (~40 min) · total ~45 min · ~€8<br>Fixed taxi fare: €50–55 (night +€10)</p><h3>Ciampino Airport (CIA)</h3><p>Bus or Tram → Termini → Terravision/SIT bus (~50 min, ~€6) · <a href="https://www.terravision.eu" target="_blank">terravision.eu</a></p><h3>Taxi</h3><p>Radio Taxi Roma: <a href="tel:+390635700">+39 06 3570</a><br>Apps: FreeNow · itTaxi · Uber<br>Fixed fare Fiumicino: €50–55</p><h3>Private Transfer</h3><p>Welcome Pickups: <a href="https://www.welcomepickups.com" target="_blank">welcomepickups.com</a></p><h3>Luggage Storage</h3><p>Radical Storage — Piazza Mastai (~5 min walk): <a href="https://radicalstorage.com" target="_blank">radicalstorage.com</a> · from €5/day</p>`,

async function requestOtp(){
  const btn=document.getElementById('send-otp-btn'),errEl=document.getElementById('send-otp-error'),lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(btn){btn.disabled=true;btn.textContent=lbl.sending;}
  if(errEl) errEl.textContent='';
  const fail={en:'Unable to send code. Please call:',it:'Impossibile inviare il codice. Chiama:',fr:"Impossible d'envoyer le code. Appelez:",de:'Fehler beim Senden. Rufen Sie an:',es:'Error al enviar. Llame:'};
  try{
    const r=await fetch(`${SERVER_URL}/checkin/trastevere/send-otp?t=${urlToken}&lang=${lang}`,{method:'POST'});
    const j=await r.json();
    if(j.ok){otpSent=true;openModal('keys');}
    else{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent=(fail[lang]||fail.en)+' '+A().phone;}
  }catch{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent='Network error. Call: '+A().phone;}
}

async function verifyOtp(){
  const input=document.getElementById('otp-input'),btn=document.getElementById('verify-btn'),errEl=document.getElementById('otp-error');
  if(!input||!btn) return;
  const code=input.value.trim(); if(code.length<4) return;
  btn.disabled=true;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verifying;
  try{
    const r=await fetch(`${SERVER_URL}/checkin/trastevere/verify-otp?t=${urlToken}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const j=await r.json();
    if(j.ok&&j.st){sessionToken=j.st;sessionStorage.setItem('st_trastevere',j.st);otpSent=false;openModal('keys');}
    else{if(errEl)errEl.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).wrongCode;btn.disabled=false;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verify;}
  }catch{btn.disabled=false;}
}

async function shellyOpen(type){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(!confirm(type==='building'?lbl.confirmBuilding:lbl.confirmDoor)) return;
  const btn=document.getElementById(`open-${type}-btn`); if(!btn) return;
  const orig=btn.textContent; btn.disabled=true;btn.textContent=lbl.opening;
  try{
    const ep=tokenCid
      ?`${SERVER_URL}/checkin/trastevere/open/${type}?t=${urlToken}&st=${sessionToken}`
      :`${SERVER_URL}/checkin/trastevere/open-direct/${type}?t=${urlToken}`;
    const r=await fetch(ep,{method:'POST'});const j=await r.json();
    if(j.ok){
      btn.textContent=lbl.opened;btn.style.background='#22c55e';btn.style.color='#fff';
      setTimeout(()=>{
        btn.textContent=orig;
        btn.style.background=type==='building'?'linear-gradient(135deg,#e8c67a,var(--gold))':'#1d4ed8';
        btn.style.color=type==='building'?'#120d09':'#fff';
        btn.disabled=false;
      },4000);
    }
    else if(['otp_required','bad_session_token','session_expired'].includes(j.error)){
      sessionToken='';sessionStorage.removeItem('st_trastevere');btn.disabled=false;btn.textContent=orig;openModal('keys');
    }
    else{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
  }catch{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
}

      let _keysExpired=false;
      try{
        const _s=new Date().toLocaleString('en-US',{timeZone:'Europe/Rome',hour:'2-digit',minute:'2-digit',hour12:false});

async function sendRomeAI(prefill){
  const input=document.getElementById('romeAiInput');
  const text=prefill||(input?input.value.trim():'');
  if(!text) return;
  if(input) input.value='';
  addRomeBubble(text,'user');
  const spin=addRomeBubble('<div class="spin"></div>','bot');
  try{
    const res=await fetch(`${SERVER_URL}/api/ai/guide`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,systemPrompt:buildRomeSystemPrompt(),history:romeAiHistory})});
    const json=await res.json();
    if(!json.ok||!json.reply) throw new Error();
    spin.innerHTML=(function renderMd(t){
      var lines=t.split('\n'),html='',inList=false;
      for(var i=0;i<lines.length;i++){
        var l=lines[i].trim();
        if(!l){if(inList){html+='</div>';inList=false;}html+='<div style="height:6px"></div>';continue;}
        var isBullet=/^[\*\-]\s+/.test(l);
        var hasBold=/\*\*/.test(l);
        if(isBullet&&hasBold){
          if(inList){html+='</div>';inList=false;}
          var content=l.replace(/^[\*\-]\s+/,'');
          var parts=content.split('|').map(function(p){return p.trim();});
          var name=parts[0].replace(/\*\*/g,'');
          var details=parts.slice(1).filter(Boolean);
          html+='<div style="background:rgba(214,176,109,.07);border:1px solid rgba(214,176,109,.18);border-radius:12px;padding:12px 14px;margin:8px 0">';
          html+='<div style="font-weight:700;color:#d6b06d;font-size:14px;margin-bottom:5px">'+name+'</div>';
          for(var j=0;j<details.length;j++){
            html+='<div style="font-size:12px;color:#b7a894;line-height:1.6;padding:1px 0">'+details[j]+'</div>';
          }
          html+='</div>';
        } else if(isBullet){
          if(!inList){html+='<div style="margin:6px 0">';inList=true;}
          html+='<div style="padding:2px 0 2px 10px;font-size:13px">• '+l.replace(/^[\*\-]\s+/,'').replace(/\*\*(.+?)\*\*/g,'<strong style="color:#d6b06d">$1</strong>')+'</div>';
        } else {
          if(inList){html+='</div>';inList=false;}
          html+='<div style="margin:3px 0;font-size:13px">'+l.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#d6b06d">$1</strong>')+'</div>';
        }
      }
      if(inList)html+='</div>';
      return html;
    })(json.reply);
    romeAiHistory.push({role:'user',parts:[{text}]});
    romeAiHistory.push({role:'model',parts:[{text:json.reply}]});
  }catch{spin.innerHTML='⚠️ '+A().phone;}
}

function addRomeBubble(html,role){
  const wrap=document.getElementById('romeAiChatVisible');
  if(!wrap) return {innerHTML:''};
  const d=document.createElement('div');
  d.className=role==='user'?'bubble-user':'bubble-bot';
  d.innerHTML=html;
  wrap.appendChild(d);
  wrap.scrollTop=wrap.scrollHeight;
  return d;
}

    it:{sub:'La guida del tuo appartamento, sempre sul telefono.',warnT:'⚠️  iPhone: devi usare Safari',warnN:"Se stai usando Chrome o un altro browser, apri prima questa pagina in Safari — altrimenti l'installazione non funzionerà.",s1t:'Passo 1 — Trova il pulsante Condividi',s1d:"Guarda la barra in fondo allo schermo. Tocca l'icona che sembra un quadrato con una freccia verso l'alto  [ ⬆ ]",s2t:'Passo 2 — Tocca "Aggiungi a schermata Home"',s2d:'Si aprirà un menu. Scorri verso il basso e cerca "Aggiungi a schermata Home" (ha una piccola icona quadrata con un +). Toccala.',s3t:'Passo 3 — Tocca "Aggiungi"',s3d:'Appare una piccola finestra. Tocca il pulsante "Aggiungi" in alto a destra. Fatto! L\'icona dell\'app apparirà nella schermata Home.',hint:'Il pulsante Condividi ⬆ si trova in basso in Safari',andBtn:'📲  Installa la Guida',andNote:'Gratis · Funziona offline · Senza App Store',fbT:'Non vedi il pulsante di installazione?',fbS:'Tocca i tre puntini ⋮ in alto a destra in Chrome, poi tocca "Aggiungi a schermata Home" o "Installa app".',skip:'Continua senza installare →'},
    fr:{sub:"Votre guide d'appartement, toujours sur votre téléphone.",warnT:'⚠️  iPhone : vous devez utiliser Safari',warnN:"Si vous utilisez Chrome ou un autre navigateur, ouvrez d'abord cette page dans Safari — sinon l'installation ne fonctionnera pas.",s1t:'Étape 1 — Trouvez le bouton Partager',s1d:"Regardez la barre en bas de l'écran. Appuyez sur l'icône qui ressemble à un carré avec une flèche vers le haut  [ ⬆ ]",s2t:"Étape 2 — «Sur l'écran d'accueil»",s2d:"Un menu s'ouvrira. Faites défiler vers le bas et cherchez «Sur l'écran d'accueil» (avec une petite icône carrée +). Appuyez dessus.",s3t:'Étape 3 — Appuyez sur «Ajouter»',s3d:"Une petite fenêtre apparaît. Appuyez sur «Ajouter» en haut à droite. Voilà ! L'icône de l'app apparaîtra sur votre écran d'accueil.",hint:'Le bouton Partager ⬆ se trouve en bas de Safari',andBtn:"📲  Installer l'Application",andNote:'Gratuit · Fonctionne hors ligne · Sans App Store',fbT:'Vous ne voyez pas le bouton ?',fbS:"Appuyez sur les trois points ⋮ en haut à droite de Chrome, puis sur «Ajouter à l'écran d'accueil».",skip:'Continuer sans installer →'},
    de:{sub:'Ihr Apartment-Leitfaden, immer auf Ihrem Telefon.',warnT:'⚠️  iPhone: Sie müssen Safari verwenden',warnN:'Wenn Sie Chrome oder einen anderen Browser verwenden, öffnen Sie diese Seite bitte zuerst in Safari — sonst funktioniert die Installation nicht.',s1t:'Schritt 1 — Finden Sie die Teilen-Schaltfläche',s1d:'Schauen Sie auf die untere Leiste des Bildschirms. Tippen Sie auf das Symbol, das wie ein Quadrat mit einem Pfeil nach oben aussieht  [ ⬆ ]',s2t:'Schritt 2 — «Zum Home-Bildschirm»',s2d:'Ein Menü öffnet sich. Scrollen Sie nach unten und suchen Sie «Zum Home-Bildschirm hinzufügen» (mit einem kleinen quadratischen + Symbol). Tippen Sie darauf.',s3t:'Schritt 3 — Tippen Sie auf «Hinzufügen»',s3d:'Ein kleines Fenster erscheint. Tippen Sie oben rechts auf «Hinzufügen». Fertig! Das App-Symbol erscheint auf Ihrem Startbildschirm.',hint:'Die Teilen-Schaltfläche ⬆ befindet sich unten in Safari',andBtn:'📲  App Installieren',andNote:'Kostenlos · Offline verfügbar · Kein App Store nötig',fbT:'Sehen Sie den Installations-Button nicht?',fbS:'Tippen Sie auf die drei Punkte ⋮ oben rechts in Chrome, dann auf «Zum Startbildschirm hinzufügen».',skip:'Ohne Installation fortfahren →'},

  };
  var l=(typeof lang!=='undefined'&&T[lang])?lang:((navigator.language||'en').slice(0,2).toLowerCase());

  $s('pwaSkipIOS',t.skip);$s('pwaSkipAndroid',t.skip);
  var scr=document.getElementById('pwaScreen');
  scr.style.display='flex';
  document.getElementById('pwaSkipIOS').onclick=function(){scr.style.display='none';};
  document.getElementById('pwaSkipAndroid').onclick=function(){scr.style.display='none';};
  if(isIOS){
    document.getElementById('pwaIOS').style.display='block';
    return;
  }
  var deferredPrompt=null;
  var androidDiv=document.getElementById('pwaAndroid');
  var fallbackTimer=setTimeout(function(){
    if(!deferredPrompt){androidDiv.style.display='block';document.getElementById('pwaAndroidFb').style.display='block';document.getElementById('pwaInstallBtn').style.display='none';}
  },3000);
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();clearTimeout(fallbackTimer);
    deferredPrompt=e;androidDiv.style.display='block';
    document.getElementById('pwaInstallBtn').onclick=function(){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r){deferredPrompt=null;if(r.outcome==='accepted')scr.style.display='none';});
    };
  });
  window.addEventListener('appinstalled',function(){scr.style.display='none';});
})();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js');});
}
