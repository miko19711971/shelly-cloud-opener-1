const SERVER_URL = 'https://shelly-cloud-opener-1.onrender.com';
const APT = 'trastevere';
const HAS_DOOR = true;

const urlP = new URLSearchParams(location.search);
let phase = 1;
const urlToken = urlP.get('t') || '';
if (urlP.has('phase')) {
  const cp = new URLSearchParams(urlP); cp.delete('phase');
  const qs = cp.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}
async function loadPhase() {
  if (!urlToken) { phase = 1; applyPhase(); schedulePhaseCheck(); return; }
  try {
    const r = await fetch(`${SERVER_URL}/checkin/trastevere/phase?t=${encodeURIComponent(urlToken)}`);
    if (r.ok) { const j = await r.json(); phase = j.phase || 1; }
  } catch(e) { phase = 1; }
  localStorage.setItem('phase_trastevere', phase);
  applyPhase(); schedulePhaseCheck();
}
function schedulePhaseCheck() {
  if (phase < 3 && urlToken) setTimeout(loadPhase, 60000);
}

async function requestOtp(){

function buildRomeSystemPrompt(){
  const a=A();
  return `You are the concierge for Viale Trastevere 108, Rome (NiceFlatInRome), located on the main boulevard of Trastevere — one of Rome's most vibrant neighborhoods, known for its restaurants, nightlife, Santa Maria in Trastevere, Porta Portese Sunday market, and the beautiful Gianicolo hill. Always respond in ${{en:'English',it:'Italian',fr:'French',de:'German',es:'Spanish'}[lang]||'English'}, regardless of what language the user types. Be warm, practical, and concise.\n\nThis is a larger apartment: ${a.bedrooms} | Concierge: ${a.concierge} | Registration: ${a.registration}\n\nApartment info: Check-in from ${a.checkin_time} | Check-out by ${a.checkout_time} | Wi-Fi: ${a.wifi_note} | SSID: ${a.wifi_ssid} | Password: ${a.wifi_password} | Phone: ${a.phone} | Water: ${a.water_note} | AC: ${a.ac_note} | Gas stove: ${a.gas} | Bathroom warning: ${a.bathroom_notice} | Pharmacy: ${a.pharmacy} | Transport: ${a.city_transport} | Airports: ${a.airports} | Taxi: ${a.taxi} | Emergency: ${a.emergency} | Checkout: ${a.checkout_note} | Keys: ${a.keys_msg}`;
}

async function sendRomeAI(prefill){
  const input=document.getElementById('romeAiInput');
  const text=prefill||(input?input.value.trim():'');
  if(!text) return;
  if(input) input.value='';
  addRomeBubble(text,'user');
  const spin=addRomeBubble('<div class="spin"></div>','bot');
  try{
    const res=await fetch(`${SERVER_URL}/api/ai/guide`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,systemPrompt:buildRomeSystemPrompt(),history:romeAiHistory})});
    const json=await res.json();
    if(!json.ok||!json.reply) throw new Error();
    spin.innerHTML=json.reply.replace(/\n/g,'<br>');
    romeAiHistory.push({role:'user',parts:[{text}]});
    romeAiHistory.push({role:'model',parts:[{text:json.reply}]});
  }catch{spin.innerHTML='⚠️ '+A().phone;}
}

function addRomeBubble(html,role){
  const wrap=document.getElementById('romeAiChatVisible');
  if(!wrap) return {innerHTML:''};
  const d=document.createElement('div');
  d.className=role==='user'?'bubble-user':'bubble-bot';
  d.innerHTML=html;
  wrap.appendChild(d);
  wrap.scrollTop=wrap.scrollHeight;
  return d;
}

renderUI();
