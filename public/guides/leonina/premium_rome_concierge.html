const SERVER_URL = 'https://shelly-cloud-opener-1.onrender.com';
const APT = 'leonina';
const HAS_DOOR = true;

const urlP = new URLSearchParams(location.search);
let phase = 1;
const urlToken = urlP.get('t') || '';
if (urlP.has('phase')) {
  const cp = new URLSearchParams(urlP); cp.delete('phase');
  const qs = cp.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}
async function loadPhase() {
  if (!urlToken) { phase = 1; applyPhase(); schedulePhaseCheck(); return; }
  try {
    const r = await fetch(`${SERVER_URL}/checkin/leonina/phase?t=${encodeURIComponent(urlToken)}`);
    if (r.ok) { const j = await r.json(); phase = j.phase || 1; }
  } catch(e) { phase = 1; }
  localStorage.setItem('phase_leonina', phase);
  applyPhase(); schedulePhaseCheck();
}
function schedulePhaseCheck() {
  if (phase < 3 && urlToken) setTimeout(loadPhase, 60000);
}

function buildKeysHTML(a){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  const email=`<div style="text-align:center;padding:16px 0"><div style="font-size:46px;margin-bottom:14px">📧</div><p style="font-weight:600;margin-bottom:12px;color:var(--cream)">${a.keys_msg}</p><p style="font-size:12px;color:var(--muted);margin-top:14px">${U().footerHelp} <a href="tel:${a.phone}" style="color:var(--gold)">${a.phone}</a></p></div>`;

  if(!tokenValid())return email+`<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;font-size:13px;color:#fca5a5;text-align:center">⏱ ${lbl.expired} <a href="tel:${a.phone}" style="color:var(--gold)">${a.phone}</a></div>`;

    let btns=`<button onclick="shellyOpen('building')" id="open-building-btn" style="width:100%;background:var(--gold);color:#120d09;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer;margin-top:12px">${lbl.building}</button>`;

    return email+btns;
  }
  const otp=otpSent
    ?`<div style="margin-top:16px"><p style="font-size:13px;color:var(--muted);margin-bottom:8px">${lbl.codeSent}</p><input id="otp-input" type="tel" inputmode="numeric" maxlength="6" placeholder="${lbl.codePlaceholder}" style="width:100%;padding:12px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:11px;font-size:20px;text-align:center;letter-spacing:8px;margin-bottom:8px;color:var(--cream)"><button onclick="verifyOtp()" id="verify-btn" style="width:100%;background:var(--gold);color:#120d09;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer">${lbl.verify}</button><p id="otp-error" style="font-size:12px;color:#fca5a5;margin-top:8px;text-align:center"></p></div>`
    :`<div style="margin-top:16px;padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:15px;text-align:center"><p style="font-size:13px;color:var(--muted);margin-bottom:12px">🔐 ${lbl.verifyTitle}</p><button onclick="requestOtp()" id="send-otp-btn" style="width:100%;background:var(--gold);color:#120d09;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:none;cursor:pointer">${lbl.send}</button><p id="send-otp-error" style="font-size:12px;color:#fca5a5;margin-top:8px;text-align:center"></p></div>`;
  return email+otp;
}

async function requestOtp(){
  const btn=document.getElementById('send-otp-btn'),errEl=document.getElementById('send-otp-error'),lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(btn){btn.disabled=true;btn.textContent=lbl.sending;}if(errEl)errEl.textContent='';
  const fail={en:'Unable to send code. Please call:',it:'Impossibile inviare il codice. Chiama:',fr:"Impossible d'envoyer le code. Appelez:",de:'Fehler beim Senden. Rufen Sie an:',es:'Error al enviar. Llame:'};
  try{const r=await fetch(`${SERVER_URL}/checkin/leonina/send-otp?t=${urlToken}&lang=${lang}`,{method:'POST'});const j=await r.json();
    if(j.ok){otpSent=true;openModal('keys');}else{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent=(fail[lang]||fail.en)+' '+A().phone;}
  }catch{if(btn){btn.disabled=false;btn.textContent=lbl.send;}if(errEl)errEl.textContent='Network error. Call: '+A().phone;}
}

async function verifyOtp(){
  const input=document.getElementById('otp-input'),btn=document.getElementById('verify-btn'),errEl=document.getElementById('otp-error');
  if(!input||!btn)return;const code=input.value.trim();if(code.length<4)return;
  btn.disabled=true;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verifying;
  try{const r=await fetch(`${SERVER_URL}/checkin/leonina/verify-otp?t=${urlToken}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});const j=await r.json();
    if(j.ok&&j.st){sessionToken=j.st;sessionStorage.setItem('st_leonina',j.st);otpSent=false;openModal('keys');}
    else{if(errEl)errEl.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).wrongCode;btn.disabled=false;btn.textContent=(DOOR_LABELS[lang]||DOOR_LABELS.en).verify;}
  }catch{btn.disabled=false;}
}

async function shellyOpen(type){
  const lbl=DOOR_LABELS[lang]||DOOR_LABELS.en;
  if(!confirm(type==='building'?lbl.confirmBuilding:lbl.confirmDoor))return;
  const btn=document.getElementById(`open-${type}-btn`);if(!btn)return;
  const orig=btn.textContent;btn.disabled=true;btn.textContent=lbl.opening;
  try{
    const ep=tokenCid?`${SERVER_URL}/checkin/leonina/open/${type}?t=${urlToken}&st=${sessionToken}`:`${SERVER_URL}/checkin/leonina/open-direct/${type}?t=${urlToken}`;
    const r=await fetch(ep,{method:'POST'});const j=await r.json();
    if(j.ok){btn.textContent=lbl.opened;btn.style.background='#22c55e';btn.style.color='#fff';setTimeout(()=>{btn.textContent=orig;btn.style.background=type==='building'?'var(--gold)':'#1d4ed8';btn.style.color=type==='building'?'#120d09':'#fff';btn.disabled=false;},4000);}
    else if(['otp_required','bad_session_token','session_expired'].includes(j.error)){sessionToken='';sessionStorage.removeItem('st_leonina');btn.disabled=false;btn.textContent=orig;openModal('keys');}
    else{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
  }catch{btn.textContent='✗';btn.disabled=false;setTimeout(()=>{btn.textContent=orig;},3000);}
}

async function sendRomeAI(prefill){
  const input=document.getElementById('romeAiInput');
  const text=prefill||(input?input.value.trim():'');if(!text)return;
  if(input)input.value='';
  addRomeBubble(text,'user');const spin=addRomeBubble('<div class="spin"></div>','bot');

    const res=await fetch(`${SERVER_URL}/api/ai/guide`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,systemPrompt:buildRomeSystemPrompt(),history:romeAiHistory})});

    romeAiHistory.push({role:'user',parts:[{text}]});romeAiHistory.push({role:'model',parts:[{text:json.reply}]});
  }catch{spin.innerHTML='⚠️ '+A().phone;}
}

function addRomeBubble(html,role){
  const wrap=document.getElementById('romeAiChatVisible');if(!wrap)return{innerHTML:''};
  const d=document.createElement('div');d.className=role==='user'?'bubble-user':'bubble-bot';d.innerHTML=html;

}
