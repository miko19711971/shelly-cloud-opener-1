<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #C9A96E; --dark: #000; --cream: #FAF6EF; --red: #CC0000; --yellow: #FFE135; }
html, body { height: 100%; background: var(--dark); font-family: 'Montserrat', sans-serif; }
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: var(--dark); padding: 2rem 1.5rem; }
.screen.active { display: flex; }
#unlock::before { content:''; position:fixed; inset:12px; border:1px solid rgba(201,169,110,0.3); pointer-events:none; z-index:10; }
.glow { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:300px; height:300px; background:radial-gradient(circle,rgba(255,225,53,0.08) 0%,transparent 70%); pointer-events:none; }
.brand { font-size:1rem; font-weight:800; letter-spacing:0.5em; color:var(--gold); text-transform:uppercase; margin-bottom:1.5rem; }
.main-gift { font-size:clamp(6rem,28vw,9rem); line-height:1; animation:bounce 1.5s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(255,225,53,0.6)); margin-bottom:1.5rem; }
.main-offer { font-size:clamp(2.5rem,12vw,4rem); font-weight:900; color:var(--yellow); letter-spacing:0.05em; margin-bottom:0.5rem; }
.main-free { font-size:clamp(1.8rem,8vw,2.8rem); font-weight:900; color:#fff; letter-spacing:0.05em; margin-bottom:2.5rem; }
.orn { display:flex; align-items:center; gap:3vw; width:80%; max-width:300px; margin-bottom:2rem; }
.orn-bar { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.orn-dia { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }
.cassa-btn { background:var(--red); color:#fff; font-size:clamp(0.85rem,3.5vw,1rem); font-weight:800; letter-spacing:0.15em; text-transform:uppercase; padding:1.1rem 2rem; border-radius:3px; border:none; cursor:pointer; width:100%; max-width:320px; margin-bottom:2rem; animation:pulse 2s ease-in-out infinite; }
.extra-btn { background:transparent; color:var(--yellow); font-family:'Montserrat',sans-serif; font-size:0.85rem; font-weight:800; letter-spacing:0.15em; text-transform:uppercase; padding:0.9rem 1.5rem; border-radius:3px; border:2px solid var(--yellow); cursor:pointer; width:100%; max-width:320px; animation:blink 1.2s ease-in-out infinite; }
.address { font-size:0.45rem; font-weight:200; letter-spacing:0.35em; color:rgba(201,169,110,0.2); text-transform:uppercase; margin-top:1.5rem; }
/* REFERRAL */
.ref-gift { font-size:clamp(3rem,15vw,5rem); margin-bottom:1rem; animation:bounce 1.5s ease-in-out infinite; }
.ref-title { font-size:clamp(1.5rem,7vw,2.2rem); font-weight:900; color:var(--red); letter-spacing:0.1em; text-transform:uppercase; text-align:center; margin-bottom:0.8rem; }
.ref-reward { font-size:clamp(1rem,4.5vw,1.4rem); font-weight:900; color:var(--yellow); letter-spacing:0.1em; text-transform:uppercase; text-align:center; margin-bottom:1rem; }
.ref-spilla { width:220px; height:220px; object-fit:cover; border-radius:8px; border:1px solid rgba(201,169,110,0.2); display:block; margin-bottom:1.5rem; }
.back-btn { background:transparent; color:rgba(201,169,110,0.5); font-family:'Montserrat',sans-serif; font-size:0.7rem; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; padding:0.6rem 1.2rem; border-radius:3px; border:1px solid rgba(201,169,110,0.3); cursor:pointer; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
@keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 12px rgba(255,225,53,0.5)} 50%{opacity:0.35;box-shadow:none} }
</style>
</head>

  'pl': { unlocked:'PREZENT ODBLOKOWANY', free:'GRATIS', cassa:'📱 POKAŻ PRZY KASIE', extra:'✨ DODATKOWY PREZENT', ref_title:'PRZYPROWADŹ PRZYJACIELA', ref_reward:'OTRZYMASZ BROSZKĘ GRATIS' },
  'pt': { unlocked:'PRESENTE DESBLOQUEADO', free:'GRÁTIS', cassa:'📱 MOSTRAR NO CAIXA', extra:'✨ PRESENTE EXTRA', ref_title:'TRAGA UM AMIGO', ref_reward:'VOCÊ RECEBE UM BROCHE GRÁTIS' },
  'ar': { unlocked:'تم فتح الهدية', free:'مجاناً', cassa:'📱 أظهر عند الكاشير', extra:'✨ هدية إضافية', ref_title:'أحضر صديقاً', ref_reward:'ستحصل على بروش مجاناً' },
  'ko': { unlocked:'선물 잠금 해제', free:'무료', cassa:'📱 계산대에서 보여주세요', extra:'✨ 추가 선물', ref_title:'친구를 데려오세요', ref_reward:'브로치를 무료로 받으세요' },
};

const langMap = {'it':'it','en':'en','fr':'fr','es':'es','de':'de','zh':'zh','ru':'ru','ja':'ja','pl':'pl','pt':'pt','ar':'ar','ko':'ko'};
const detected = langMap[(navigator.language||'en').substring(0,2).toLowerCase()] || 'en';
const t = UNLOCK_TEXTS[detected];
document.getElementById('unlock-title').textContent = t.unlocked;
document.getElementById('unlock-free').textContent = t.free;
document.getElementById('unlock-cassa').textContent = t.cassa;
document.getElementById('unlock-extra').textContent = t.extra;
document.getElementById('ref-title').textContent = t.ref_title;
document.getElementById('ref-reward').textContent = t.ref_reward;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>

<script>
// ── Configurazione ──────────────────────────────────────────────────────────
const GAS_URL = '';
const CASHIER_PIN = '';
const COMBO_URL = 'https://biba-boutique.onrender.com/biba_cassa.html';

// ── Genera token univoco lato client ────────────────────────────────────────
function genToken() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let t = 'BIBA-';
  for (let i = 0; i < 6; i++) t += chars[Math.floor(Math.random() * chars.length)];
  return t;
}

// ── Scrive su Google Sheet ───────────────────────────────────────────────────
function logSheet(token, tipo) {
  const now = new Date();
  const ts = now.toISOString();
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token, tipo, timestamp: ts,
      userAgent: navigator.userAgent
    })
  }).catch(() => {});
}

// ── Testi multilingua ────────────────────────────────────────────────────────
const langMap = {it:'it',en:'en',fr:'fr',es:'es',de:'de',zh:'zh',ru:'ru',ja:'ja',pl:'pl',pt:'pt',ar:'ar',ko:'ko'};
const lang = langMap[(navigator.language||'en').substring(0,2).toLowerCase()] || 'en';
const labels = {
  token: {it:'IL TUO CODICE',en:'YOUR CODE',fr:'VOTRE CODE',es:'TU CÓDIGO',de:'DEIN CODE',zh:'你的代码',ru:'ВАШ КОД',ja:'コード',pl:'TWÓJ KOD',pt:'SEU CÓDIGO',ar:'رمزك',ko:'코드'},
  combo: {it:'🛍 VEDI LE COMBINAZIONI',en:'🛍 SEE COMBINATIONS',fr:'🛍 VOIR COMBINAISONS',es:'🛍 VER COMBINACIONES',de:'🛍 KOMBINATIONEN',zh:'🛍 查看组合',ru:'🛍 КОМБИНАЦИИ',ja:'🛍 組み合わせ',pl:'🛍 KOMBINACJE',pt:'🛍 COMBINAÇÕES',ar:'🛍 التشكيلات',ko:'🛍 조합 보기'},
  staff: {it:'Solo per il personale di cassa',en:'Staff only',fr:'Personnel uniquement',es:'Solo personal',de:'Nur für Personal',zh:'仅限员工',ru:'Только персонал',ja:'スタッフのみ',pl:'Tylko personel',pt:'Só funcionários',ar:'للموظفين فقط',ko:'직원 전용'},
  activate: {it:'▸ ATTIVA',en:'▸ ACTIVATE',fr:'▸ ACTIVER',es:'▸ ACTIVAR',de:'▸ AKTIVIEREN',zh:'▸ 激活',ru:'▸ АКТИВИРОВАТЬ',ja:'▸ 有効化',pl:'▸ AKTYWUJ',pt:'▸ ATIVAR',ar:'▸ تفعيل',ko:'▸ 활성화'}
};
function t(k) { return (labels[k]||{})[lang] || labels[k].en; }

// ── Init ─────────────────────────────────────────────────────────────────────
window._bibaToken = genToken();
logSheet(window._bibaToken, 'vetrina');

window.addEventListener('DOMContentLoaded', () => {
  // 1. Box token
  const orn = document.querySelector('#unlock .orn');
  if (orn) {
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;margin-bottom:1.2rem;';
    div.innerHTML =
      '<div style="font-size:0.45rem;letter-spacing:0.3em;color:rgba(201,169,110,0.4);text-transform:uppercase;margin-bottom:0.4rem;">' + t('token') + '</div>' +
      '<div style="border:1px solid #C9A96E;padding:0.5rem 1.8rem;font-size:1.1rem;font-weight:700;color:#C9A96E;letter-spacing:0.35em;display:inline-block;font-family:monospace;">' + window._bibaToken + '</div>';
    orn.insertAdjacentElement('afterend', div);
  }

  // 2. Link combinazioni
  const address = document.querySelector('#unlock .address');
  if (address) {
    const a = document.createElement('a');
    a.href = COMBO_URL;
    a.style.cssText = 'display:block;width:100%;max-width:320px;text-align:center;margin-bottom:1rem;padding:0.75rem 1.5rem;background:transparent;border:1px solid rgba(201,169,110,0.35);color:rgba(201,169,110,0.65);font-size:0.65rem;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;font-family:inherit;';
    a.textContent = t('combo');
    address.insertAdjacentElement('beforebegin', a);
  }

  // 3. Sezione cassa con PIN
  const unlock = document.getElementById('unlock');
  if (unlock) {
    const div = document.createElement('div');
    div.style.cssText = 'margin-top:1.8rem;border-top:1px solid rgba(201,169,110,0.1);padding-top:1rem;width:100%;max-width:320px;text-align:center;';
    div.innerHTML =
      '<div style="font-size:0.38rem;letter-spacing:0.3em;color:rgba(201,169,110,0.18);text-transform:uppercase;margin-bottom:0.9rem;">' + t('staff') + '</div>' +
      '<div style="display:flex;gap:8px;width:100%;margin-bottom:0.6rem;">' +
        '<input id="biba-pin" type="password" inputmode="numeric" maxlength="4" placeholder="PIN" ' +
        'style="flex:1;background:transparent;border:1px solid #333;color:#888;font-size:1.1rem;letter-spacing:0.4em;text-align:center;padding:0.55rem;font-family:monospace;outline:none;" />' +
        '<button id="biba-btn" onclick="bibaActivate()" ' +
        'style="background:transparent;border:1px solid #333;color:#555;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.55rem 1rem;cursor:pointer;font-family:inherit;white-space:nowrap;">' +
        t('activate') + '</button>' +
      '</div>' +
      '<div id="biba-result" style="font-size:0.85rem;font-weight:700;letter-spacing:0.05em;display:none;"></div>';
    unlock.appendChild(div);
  }
});

// ── Attivazione cassa ────────────────────────────────────────────────────────
window._bibaUsed = 0;
function bibaActivate() {
  const pin = (document.getElementById('biba-pin')||{}).value || '';
  const btn = document.getElementById('biba-btn');
  const res = document.getElementById('biba-result');
  res.style.display = 'block';

  if (pin !== CASHIER_PIN) {
    res.style.color = '#e63946';
    res.textContent = '❌ PIN errato';
    document.getElementById('biba-pin').value = '';
    return;
  }

  if (window._bibaUsed === 0) {
    window._bibaUsed = 1;
    res.style.color = '#4caf50';
    res.textContent = '✅ OK — 2+1 gratis';
    btn.textContent = '✅ ATTIVATO';
    btn.style.cssText += 'border-color:#4caf50;color:#4caf50;';
    btn.disabled = true;
    logSheet(window._bibaToken, 'attivazione');
  } else if (window._bibaUsed === 1) {
    window._bibaUsed = 2;
    res.style.color = '#f9c74f';
    res.textContent = '🎁 Referral — spilla gratis';
    btn.textContent = '🎁 OK';
    btn.style.cssText += 'border-color:#f9c74f;color:#f9c74f;';
    btn.disabled = true;
    logSheet(window._bibaToken, 'referral');
  } else {
    res.style.color = '#e63946';
    res.textContent = '❌ Già utilizzato';
    btn.disabled = true;
  }
}
</script>

</body>
</html>
