<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Biba · Combinazioni</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #C9A96E; --dark: #000; --cream: #FAF6EF; --red: #CC0000; --yellow: #FFE135; }
html, body { height: 100%; background: var(--dark); font-family: 'Montserrat', sans-serif; }
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; background: var(--dark); }
.screen.active { display: flex; }
#home { justify-content: center; padding: 2rem 1.5rem; }
#home::before { content:''; position:fixed; inset:16px; border:1px solid rgba(201,169,110,0.2); pointer-events:none; }
.h-brand { font-family:'Cormorant Garamond',serif; font-size:clamp(3rem,12vw,5rem); font-weight:300; color:var(--gold); letter-spacing:0.25em; line-height:1; margin-bottom:0.3rem; }
.h-sub { font-size:0.6rem; letter-spacing:0.4em; color:rgba(201,169,110,0.5); text-transform:uppercase; margin-bottom:1.5rem; }
.h-prompt { font-family:'Cormorant Garamond',serif; font-size:clamp(0.9rem,3.5vw,1.2rem); font-style:italic; color:rgba(201,169,110,0.7); margin-bottom:1.5rem; text-align:center; }
.orn { display:flex; align-items:center; gap:3vw; width:80%; max-width:300px; margin-bottom:1.5rem; }
.orn-bar { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.orn-dia { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }
.lang-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; max-width:380px; }
.lang-btn { background:rgba(201,169,110,0.08); border:1px solid rgba(201,169,110,0.25); border-radius:4px; padding:0.7rem 0.4rem; cursor:pointer; text-align:center; color:var(--cream); font-family:'Montserrat',sans-serif; font-size:0.72rem; transition:all 0.2s; }
.lang-btn:active { background:rgba(201,169,110,0.2); }
.lang-flag { font-size:1.4rem; display:block; margin-bottom:0.3rem; }
#offer { justify-content:flex-start; }
.o-topbar { display:flex; align-items:center; justify-content:space-between; padding:0.8rem 1.2rem; border-bottom:1px solid rgba(201,169,110,0.12); width:100%; }
.o-back { font-size:0.6rem; font-weight:300; letter-spacing:0.2em; color:rgba(201,169,110,0.5); background:none; border:none; cursor:pointer; text-transform:uppercase; font-family:'Montserrat',sans-serif; }
.o-brand { font-family:'Montserrat',sans-serif; font-size:1rem; font-weight:800; color:var(--gold); letter-spacing:0.35em; text-transform:uppercase; }
.progress-track { height:2px; background:rgba(201,169,110,0.1); width:100%; }
.progress-fill { height:100%; background:var(--gold); width:0%; transition:width 0.08s linear; }
.o-title { text-align:center; padding:1rem 1.5rem 0.5rem; width:100%; }
.o-title h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(1.2rem,5vw,1.8rem); font-weight:400; color:var(--gold); letter-spacing:0.1em; }
.o-title p { font-size:clamp(0.75rem,3vw,0.95rem); font-weight:800; color:var(--yellow); margin-top:0.3rem; }
.slides-wrapper { width:100%; padding:0 1rem 1rem; }
.slide { display:none; flex-direction:column; align-items:center; width:100%; animation:fadeIn 0.4s ease; }
.slide.active { display:flex; }
.s-label { font-size:0.5rem; font-weight:300; letter-spacing:0.3em; text-transform:uppercase; color:rgba(201,169,110,0.35); margin-bottom:0.4rem; }
.products-row { display:flex; align-items:center; justify-content:center; gap:1.2rem; width:100%; margin-bottom:0.8rem; }
.product-card { flex:1; max-width:130px; text-align:center; }
.product-card img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:4px; border:1px solid rgba(201,169,110,0.2); }
.product-card-name { font-size:0.75rem; font-weight:500; color:var(--yellow); margin-top:0.4rem; line-height:1.4; }
.plus { font-size:2.5rem; font-weight:900; color:var(--red); flex-shrink:0; font-family:'Montserrat',sans-serif; }
.free-block { width:100%; background:linear-gradient(135deg,#1a0a0a,#0d0505); border:1px solid rgba(201,169,110,0.3); border-radius:4px; padding:1.2rem 0.8rem; display:flex; flex-direction:column; align-items:center; text-align:center; gap:0.5rem; position:relative; margin-top:1rem; margin-bottom:1rem; }
.free-block::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.free-tag { font-size:1.6rem; font-weight:900; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); display:block; }
.free-img { width:75px; height:75px; object-fit:cover; border-radius:50%; border:2px solid rgba(201,169,110,0.4); margin-top:1rem; margin-bottom:0.5rem; }
.free-item-name { font-family:'Cormorant Garamond',serif; font-size:clamp(1rem,4vw,1.3rem); color:var(--cream); }
.dots-row { display:flex; justify-content:center; gap:10px; padding:0.5rem 0 0.5rem; width:100%; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(201,169,110,0.2); border:none; cursor:pointer; transition:all 0.3s; }
.dot.active { background:var(--gold); transform:scale(1.4); }
.swipe-hint { font-size:0.45rem; font-weight:300; letter-spacing:0.2em; color:rgba(201,169,110,0.2); text-align:center; padding-bottom:1rem; text-transform:uppercase; width:100%; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes fadeIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>

<div class="screen active" id="home">
  <div class="h-brand">biba</div>
  <div class="h-sub">Roma · Italia</div>
  <div class="orn"><div class="orn-bar"></div><div class="orn-dia"></div><div class="orn-bar"></div></div>
  <div class="h-prompt">Select your language · Scegli la tua lingua</div>
  <div class="lang-grid" id="lang-grid"></div>
</div>

<div class="screen" id="offer">
  <div class="o-topbar">
    <button class="o-back" onclick="show('home')">← back</button>
    <div class="o-brand">BIBA</div>
    <div id="top-lang" style="font-size:1.2rem;"></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
  <div class="o-title"><h1 id="offer-h1"></h1><p id="offer-p"></p></div>
  <div class="slides-wrapper" id="slides-wrapper"></div>
  <div class="dots-row" id="dots-row"></div>
  <div class="swipe-hint">← swipe →</div>
</div>

})();
