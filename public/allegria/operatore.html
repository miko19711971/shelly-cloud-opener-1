<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Allegria – Operatore</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Georgia, serif;
background:#f6f3ee;
color:#2f2f2f;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:60px 24px;
}

h1{
font-size:34px;
margin-bottom:20px;
}

.box{
background:white;
border:1px solid #e5e0d8;
border-radius:8px;
padding:24px;
margin-bottom:30px;
}

h2{
margin-top:0;
font-size:22px;
}

p{
font-size:18px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Briefing visita</h1>

<div class="box">
<p><b>ID visita:</b> <span id="visita"></span></p>
<p><b>Cliente:</b> <span id="cliente"></span></p>
<p><b>Operatore:</b> <span id="operatore"></span></p>
</div>

<div id="briefing" class="box">
Caricamento briefing cliente...
</div>

</div>


<script>

async function caricaBriefing(){

const params = new URLSearchParams(window.location.search);
const cliente = params.get("cliente");

if(!cliente){
document.getElementById("briefing").innerHTML="Cliente non specificato";
return;
}

const url="https://script.google.com/macros/s/AKfycbzORvHQMUnyWEVylh4bd99W305GpyHx6Yx31DxtWC35nemRPTd2F23ikYkFZ7BJs9QCyw/exec?page=briefing&cliente="+cliente;

const res = await fetch(url);
const data = await res.json();

let html=`
<h2>Profilo cliente</h2>

<p><b>Formato visita:</b> ${data.formato}</p>
<p><b>Idea incontro:</b> ${data.idea}</p>
<p><b>Nota operatore:</b> ${data.nota}</p>
`;

if(data.jolly !== "NON ATTIVO"){

html+=`
<h2>Esperienza Jolly</h2>

<p><b>Tipo:</b> ${data.jolly.tipo}</p>
<p><b>Leve:</b> ${data.jolly.leve}</p>
<p><b>Obiettivo:</b> ${data.jolly.obiettivo}</p>
<p><b>Limiti:</b> ${data.jolly.limiti}</p>
`;
}

document.getElementById("briefing").innerHTML=html;

}

caricaBriefing();

</script>

</body>
</html>
