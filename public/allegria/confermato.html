<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prenotazione confermata</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: white; }
    .box { text-align: center; max-width: 400px; padding: 40px; }
    h2 { color: #2e7d32; font-size: 28px; }
    p { color: #555; font-size: 16px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>✅ Prenotazione confermata!</h2>
    <p>Riceverai una email con il link Google Meet.</p>
    <p>Grazie, a presto!</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");
    const date = params.get("date");
    const exec = params.get("exec");
    if (email && date && exec) {
      fetch(exec + "&email=" + encodeURIComponent(email) + "&date=" + encodeURIComponent(date));
    }
  </script>
</body>
</html>
